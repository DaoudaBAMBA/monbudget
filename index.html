*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;width:100%}
body{min-height:100%;background:#070612;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;color:#F8F7FF;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
#root{height:100vh;display:flex;flex-direction:column;position:relative;-webkit-user-select:none;user-select:none}
.scroll{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;-webkit-user-select:none;user-select:none;overscroll-behavior-y:contain;padding-bottom:max(80px, calc(80px + env(safe-area-inset-bottom)))}
::-webkit-scrollbar{display:none}
.tap{cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;-webkit-user-select:none}
input,select,textarea{font-family:inherit;color:#F8F7FF;font-size:max(16px,1em)}
input:focus,select:focus{outline:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.4;cursor:pointer}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{display:none}
.chip{display:inline-flex;align-items:center;justify-content:center;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;border:1px solid transparent}
.pill{display:inline-flex;align-items:center;justify-content:center;padding:7px 16px;border-radius:24px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;border:1px solid transparent}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{animation:slideUp .25s ease}
.overlay{animation:fadeIn .2s ease}
/* BOTTOM NAV FIXE */
.nav-spacer{height:80px}
@supports(padding:max(0px)){
  .nav-spacer{padding-bottom:max(12px,env(safe-area-inset-bottom))}
}

@media(min-width:768px){
  body{display:flex;align-items:center;justify-content:center;background:#050410}
  #root{width:460px;height:min(93vh,920px);border-radius:44px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.95),0 0 0 1px rgba(255,255,255,.08);position:relative}
}
@media(min-width:1100px){
  body{align-items:stretch;padding:20px;gap:0;justify-content:center}
  #root{width:min(96vw,1160px);height:calc(100vh - 40px);border-radius:24px;overflow:hidden;display:flex;flex-direction:row}
  .scroll{padding-bottom:24px!important}
  .bnav{display:none!important}
  .snav{display:flex!important;width:220px;min-width:220px;flex-shrink:0}
}

function IcoSVG({name,size=20,color="white"}){
  const d=ILIB[name];if(!d)return null;
  const paths=d.split("|");
  const sw=(size/20)*1.8;
  return(
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      {paths.map((p,i)=><path key={i} d={p} stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" fill="none"/>)}
    </svg>
  );
}

function toMonthly(amount,freq){
  if(freq==="weekly")return amount*52/12;
  if(freq==="biweekly")return amount*26/12;
  if(freq==="quarterly")return amount/3;
  if(freq==="yearly")return amount/12;
  return amount;
}
function advanceDate(dateStr,freq){
  const d=new Date(dateStr+"T12:00:00");
  if(freq==="weekly")d.setDate(d.getDate()+7);
  else if(freq==="biweekly")d.setDate(d.getDate()+14);
  else if(freq==="monthly")d.setMonth(d.getMonth()+1);
  else if(freq==="quarterly")d.setMonth(d.getMonth()+3);
  else if(freq==="yearly")d.setFullYear(d.getFullYear()+1);
  return d.toISOString().slice(0,10);
}
function daysUntil(dateStr){
  const t=new Date();t.setHours(0,0,0,0);
  const s=new Date(dateStr+"T00:00:00");
  return Math.round((s-t)/(86400000));
}

function BarChart({data}){
  const [hover,setHover]=useState(null);

  const maxV=Math.max(...data.flatMap(d=>[d.inc,d.exp]),1);
  const H=80,bW=7,gap=3,grW=bW*2+gap+8,totalW=data.length*grW;
  return(
    <div style={{position:"relative"}}>
      {hover!==null&&data[hover]&&(
        <div style={{position:"absolute",top:-40,left:`${(hover/data.length)*100+2}%`,background:C.card2,border:`1px solid ${C.border2}`,borderRadius:8,padding:"4px 8px",zIndex:10,pointerEvents:"none",whiteSpace:"nowrap"}}>
          <p style={{fontSize:10,color:C.green,margin:0}}>+{fmt(data[hover].inc)}</p>
          <p style={{fontSize:10,color:C.red,margin:0}}>-{fmt(data[hover].exp)}</p>

      )}

        {data.map((d,i)=>{

          return(
            <g key={i} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)} onClick={()=>setHover(hover===i?null:i)} style={{cursor:"pointer"}}>
              <rect x={x} y={0} width={bW*2+gap} height={H+14} fill="transparent"/>
              <rect x={x} y={H-incH} width={bW} height={incH} fill={C.green} rx="2" fillOpacity={hover===i?1:.8}/>
              <rect x={x+bW+gap} y={H-expH} width={bW} height={expH} fill={C.red} rx="2" fillOpacity={hover===i?1:.8}/>

        })}
      </svg>

}

function MiniPie({data}){
  if(!data||data.length===0)return null;
  const total=data.reduce((s,d)=>s+d.v,0);let cumul=0;const r=44;const cx=50;const cy=50;
  return(
    <svg width="100" height="100" viewBox="0 0 100 100">
      {data.map((d,i)=>{
        const pct=d.v/total;const angle=pct*2*Math.PI;const sa=cumul*2*Math.PI-Math.PI/2;const ea=sa+angle;cumul+=pct;
        const x1=cx+r*Math.cos(sa);const y1=cy+r*Math.sin(sa);const x2=cx+r*Math.cos(ea);const y2=cy+r*Math.sin(ea);
        return<path key={i} d={`M${cx} ${cy} L${x1.toFixed(2)} ${y1.toFixed(2)} A${r} ${r} 0 ${pct>0.5?1:0} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`} fill={d.color} fillOpacity=".9"/>;
      })}
      <circle cx={cx} cy={cy} r={r*.58} fill={C.card}/>
    </svg>
  );
}

            <input type="number" value={amount} onChange={e=>setAmount(e.target.value)}
              style={{width:"100%",fontSize:28,fontWeight:800,border:"none",background:"transparent",padding:0,color:tCol,letterSpacing:"-0.5px"}}/>

          {/* Description */}

          </div>
          {/* Date */}
          <div style={{background:C.card2,borderRadius:14,padding:"12px 14px",marginBottom:10}}>
            <p style={{fontSize:10,color:C.muted,margin:"0 0 6px",textTransform:"uppercase",letterSpacing:".07em"}}>Date</p>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              style={{width:"100%",fontSize:15,border:"none",background:"transparent",color:C.text,padding:0}}/>
          </div>
          {/* Catégorie — deux niveaux */}
          <div style={{background:C.card2,borderRadius:14,padding:"12px 14px",marginBottom:10}}>
            <p style={{fontSize:10,color:C.muted,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:".07em"}}>Catégorie</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:sheetSubCats.length>0?9:0}}>
              {sheetParentCats.map(c=>{
                const isSel=sheetSelParent===c.id;
                return(
                  <div key={c.id} className="tap" onClick={()=>handleSheetParent(c.id)}
                    style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:10,background:isSel?c.color+"28":"rgba(255,255,255,.05)",border:`1.5px solid ${isSel?c.color:C.border}`}}>
                    <IcoSVG name={c.icon||"dollar"} size={12} color={isSel?c.color:"rgba(255,255,255,.35)"}/>
                    <span style={{fontSize:11,color:isSel?c.color:C.sec,fontWeight:isSel?700:400}}>{c.label}</span>
                  </div>
                );
              })}
            </div>
            {sheetSubCats.length>0&&(
              <div>
                <p style={{fontSize:9,color:C.muted,margin:"0 0 6px",textTransform:"uppercase",letterSpacing:".06em"}}>Sous-catégorie</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {sheetSubCats.map(c=>(
                    <div key={c.id} className="chip tap" onClick={()=>setCat(c.id)}
                      style={{background:cat===c.id?c.color+"28":"rgba(255,255,255,.05)",color:cat===c.id?c.color:C.sec,borderColor:cat===c.id?c.color:C.border,fontWeight:cat===c.id?700:400,fontSize:11}}>
                      {c.label}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
          {/* Compte */}
          {accounts.length>0&&!isSav&&(
            <div style={{background:C.card2,borderRadius:14,padding:"12px 14px",marginBottom:10}}>
              <p style={{fontSize:10,color:C.muted,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:".07em"}}>Compte</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {accounts.map(a=>{const b=bankById(a.bank);return(
                  <div key={a.id} className="chip tap" onClick={()=>setAccountId(a.id)}
                    style={{background:accountId===a.id?b.col+"25":C.card,color:accountId===a.id?b.col:C.muted,borderColor:accountId===a.id?b.col:"transparent"}}>
                    {a.name.slice(0,14)}
                  </div>
                );})}
              </div>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:4}}>
            <div className="tap" onClick={()=>setMode("view")} style={{textAlign:"center",padding:"13px",borderRadius:14,background:C.card2,fontSize:14,fontWeight:600,color:C.sec}}>Annuler</div>
            <div className="tap" onClick={save} style={{textAlign:"center",padding:"13px",borderRadius:14,background:C.accent,fontSize:14,fontWeight:700,color:"#fff"}}>Sauvegarder</div>
          </div>
        </>}

        {mode==="confirm"&&<>
          <p style={{fontSize:14,color:C.red,textAlign:"center",marginBottom:14,fontWeight:500}}>Supprimer cette transaction ? Cette action est irréversible et le solde du compte sera ajusté.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div className="tap" onClick={()=>setMode("view")} style={{textAlign:"center",padding:"13px",borderRadius:14,background:C.card2,fontSize:14,fontWeight:600,color:C.sec}}>Annuler</div>
            <div className="tap" onClick={onDelete} style={{textAlign:"center",padding:"13px",borderRadius:14,background:C.red,fontSize:14,fontWeight:700,color:"#fff"}}>Supprimer</div>
          </div>
        </>}
      </div>
    </div>
  );
}

// ── HOME ────────────────────────────────────────────────────────────
function Home({txns,cats,accounts,setAccounts,budgets,subs=[],setSubs,addMany,vnpHistory,setTab}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth());
  const mk=`${year}-${String(month+1).padStart(2,"0")}`;
  const mt=txns.filter(t=>t.date?.startsWith(mk));
  const income=mt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expenses=mt.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const savings=mt.filter(t=>t.type==="epargne").reduce((s,t)=>s+t.amount,0);
  const assets=accounts.filter(a=>atypeById(a.accountType).isDebt===false&&a.balance!=null).reduce((s,a)=>s+(+a.balance||0),0);
  const liab=accounts.filter(a=>atypeById(a.accountType)?.isDebt===true).reduce((s,a)=>s+(+a.balance||0),0);
  const vnp=assets-liab;
  const savingsBgt=Object.entries(budgets).filter(([k])=>cats.find(c=>c.id===k&&c.forTypes?.includes("epargne"))).reduce((s,[,v])=>s+(+v||0),0);
  const incomeBgt=Object.entries(budgets).filter(([k])=>cats.find(c=>c.id===k&&c.forTypes?.includes("income"))).reduce((s,[,v])=>s+(+v||0),0);
  const today=todayStr();
  const upcomingSubs=subs.filter(s=>s.active!==false&&daysUntil(s.nextDate)<=7).sort((a,b)=>a.nextDate.localeCompare(b.nextDate)).slice(0,5);
  const [acctReorder,setAcctReorder]=useState(false);
  function moveAcctUp(i){if(i===0)return;setAccounts(p=>{const a=[...p];[a[i-1],a[i]]=[a[i],a[i-1]];return a;});}
  function moveAcctDown(i){if(i===accounts.length-1)return;setAccounts(p=>{const a=[...p];[a[i],a[i+1]]=[a[i+1],a[i]];return a;});}
  const totalBgt=Object.entries(budgets).filter(([k])=>cats.find(c=>c.id===k&&c.forTypes?.includes("expense"))).reduce((s,[,v])=>s+(+v||0),0);
  const bycat={};mt.filter(t=>t.type==="expense").forEach(t=>{bycat[t.category]=(bycat[t.category]||0)+t.amount;});
  const topCats=Object.entries(bycat).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const budgetPct=totalBgt>0?expenses/totalBgt*100:0;
  return(
    <div className="scroll">
      <div style={{background:C.accentB,padding:"16px 18px 24px",borderBottomLeftRadius:28,borderBottomRightRadius:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <p style={{fontSize:11,color:"rgba(255,255,255,.5)",margin:"0 0 3px",textTransform:"uppercase",letterSpacing:".07em"}}>Valeur nette personnelle</p>
            <p style={{fontSize:36,fontWeight:800,margin:0,letterSpacing:"-1.5px",color:vnp>=0?"#A7F3D0":"#FCA5A5"}}>{fmt(vnp)}</p>
          </div>
        </div>
        <MonthNav year={year} month={month} onChange={(y,m)=>{setYear(y);setMonth(m);}}/>
        {/* Revenus vs Dépenses — distinction claire */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:14}}>
          <div style={{background:"rgba(16,185,129,.18)",borderRadius:14,padding:"11px 13px",border:"1px solid rgba(16,185,129,.25)"}}>
            <p style={{fontSize:9,color:"rgba(255,255,255,.55)",margin:"0 0 4px",textTransform:"uppercase",letterSpacing:".06em"}}>↑ Revenus</p>
            <p style={{fontSize:17,fontWeight:800,margin:"0 0 6px",color:"#6EE7B7",letterSpacing:"-0.5px"}}>{fmt(income)}</p>
            {incomeBgt>0&&<div style={{height:3,background:"rgba(0,0,0,.3)",borderRadius:2}}><div style={{width:`${Math.min(income/(incomeBgt||1)*100,100)}%`,height:"100%",background:"#6EE7B7",borderRadius:2}}/></div>}
          </div>
          <div style={{background:"rgba(244,63,94,.18)",borderRadius:14,padding:"11px 13px",border:"1px solid rgba(244,63,94,.25)"}}>
            <p style={{fontSize:9,color:"rgba(255,255,255,.55)",margin:"0 0 4px",textTransform:"uppercase",letterSpacing:".06em"}}>↓ Dépenses</p>
            <p style={{fontSize:17,fontWeight:800,margin:"0 0 6px",color:"#FCA5A5",letterSpacing:"-0.5px"}}>{fmt(expenses)}</p>
            {totalBgt>0&&<div style={{height:3,background:"rgba(0,0,0,.3)",borderRadius:2}}><div style={{width:`${Math.min(expenses/(totalBgt||1)*100,100)}%`,height:"100%",background:"#FCA5A5",borderRadius:2}}/></div>}
          </div>
        </div>
        {/* Flux net + Épargne */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
          <div style={{background:"rgba(0,0,0,.2)",borderRadius:12,padding:"9px 12px"}}>
            <p style={{fontSize:9,color:"rgba(255,255,255,.45)",margin:"0 0 3px",textTransform:"uppercase",letterSpacing:".05em"}}>Flux net</p>
            <p style={{fontSize:15,fontWeight:800,margin:0,letterSpacing:"-0.5px",color:(income-expenses)>=0?"#6EE7B7":"#FCA5A5"}}>{(income-expenses)>=0?"+":""}{fmt(income-expenses)}</p>
          </div>
          <div style={{background:"rgba(124,58,237,.18)",borderRadius:12,padding:"9px 12px",border:"1px solid rgba(124,58,237,.22)"}}>
            <p style={{fontSize:9,color:"rgba(255,255,255,.45)",margin:"0 0 3px",textTransform:"uppercase",letterSpacing:".05em",display:"flex",alignItems:"center",gap:4}}><IcoSVG name="piggy" size={10} color="rgba(255,255,255,.45)"/>Épargne</p>
            <p style={{fontSize:15,fontWeight:800,margin:"0 0 5px",letterSpacing:"-0.5px",color:"#C4B5FD"}}>{fmt(savings)}{savingsBgt>0&&<span style={{fontSize:9,fontWeight:500,color:"rgba(196,181,253,.6)",marginLeft:3}}>/ {fmt(savingsBgt)}</span>}</p>
            {savingsBgt>0&&<><div style={{height:3,background:"rgba(0,0,0,.3)",borderRadius:2}}><div style={{width:`${Math.min(savings/savingsBgt*100,100)}%`,height:"100%",background:savings>=savingsBgt?"#6EE7B7":"#C4B5FD",borderRadius:2,transition:"width .5s"}}/></div><p style={{fontSize:8,color:"rgba(196,181,253,.7)",margin:"3px 0 0"}}>{savings>=savingsBgt?"Objectif atteint !":Math.round(savings/savingsBgt*100)+"% atteint"}</p></>}
          </div>
        </div>
      </div>
      <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:11}}>
        {/* Budget donut */}
        {totalBgt>0&&(
          <Card>
            <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <p style={{fontSize:13,fontWeight:700,color:C.text,margin:0}}>Budget — {MFULL[month]}</p>
              <span className="tap" onClick={()=>setTab("budget")} style={{fontSize:12,color:C.accent}}>Gérer</span>
            </div>
            <div style={{padding:"14px 16px",display:"flex",gap:18,alignItems:"center"}}>
              <DonutChart pct={budgetPct} remaining={Math.max(0,totalBgt-expenses)} budget={totalBgt} spent={expenses}/>
              <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
                {topCats.length>0?topCats.map(([id,amt])=>{
                  const cat=cats.find(c=>c.id===id);if(!cat)return null;
                  const pct2=totalBgt>0?Math.min(amt/totalBgt*100,100):0;
                  return(
                    <div key={id}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:11,color:C.sec,display:"inline-flex",alignItems:"center",gap:4}}>{cat.icon&&ILIB[cat.icon]&&<IcoSVG name={cat.icon} size={10} color={cat.color}/>}{cat.label}</span>
                        <span style={{fontSize:11,fontWeight:600,color:C.text}}>{fmt(amt)}</span>
                      </div>
                      <div style={{height:3,background:C.border2,borderRadius:2}}><div style={{width:`${pct2}%`,height:"100%",background:cat.color,borderRadius:2}}/></div>
                    </div>
                  );
                }):<p style={{fontSize:12,color:C.muted,textAlign:"center"}}>Aucune dépense ce mois</p>}
              </div>
            </div>
          </Card>
        )}

        {/* Accounts — with ↑↓ reorder */}
        {accounts.length>0&&<Card>
          <div style={{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <p style={{fontSize:13,fontWeight:700,color:C.text,margin:0}}>Comptes</p>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <span className="tap" onClick={()=>setAcctReorder(r=>!r)} style={{fontSize:12,color:acctReorder?C.accent:C.muted,fontWeight:acctReorder?700:400}}>{acctReorder?"✓ Terminé":"Réordonner"}</span>
              <span className="tap" onClick={()=>setTab("stats")} style={{fontSize:12,color:C.accent}}>Gérer</span>
            </div>
          </div>
          {accounts.slice(0,5).map((a,i)=>(
            <div key={a.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:i<Math.min(4,accounts.length-1)||accounts.length>5?`1px solid ${C.border}`:"none"}}>
              {acctReorder&&<div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                <div className="tap" onClick={()=>moveAcctUp(i)} style={{width:22,height:18,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:5,background:i===0?"transparent":C.card2,opacity:i===0?.25:1}}>
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 7l3-4 3 4" stroke={C.sec} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <div className="tap" onClick={()=>moveAcctDown(i)} style={{width:22,height:18,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:5,background:i===accounts.length-1?"transparent":C.card2,opacity:i===accounts.length-1?.25:1}}>
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3l3 4 3-4" stroke={C.sec} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              </div>}
              <BankLogo bankId={a.bank} name={a.name} size={36}/>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:13,margin:0,fontWeight:500,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.name}</p>
                <p style={{fontSize:10,margin:0,color:C.muted}}>{bankById(a.bank).label}</p>
              </div>
              <p style={{fontSize:13,fontWeight:700,margin:0,color:atypeById(a.accountType)?.isDebt?C.red:C.text}}>{atypeById(a.accountType)?.isDebt?"-":""}{fmt(a.balance)}</p>
            </div>
          ))}
          {accounts.length>5&&<p style={{textAlign:"center",fontSize:11,color:C.muted,padding:"9px 10px"}}>{acctReorder?<span style={{color:C.accent}}>Réordonne les 5 premiers pour changer la priorité</span>:`+${accounts.length-5} autre${accounts.length-5>1?"s":""}`}</p>}
        </Card>}

        {/* ── ABONNEMENTS À VENIR (2e position) ── */}
        {upcomingSubs.length>0&&<Card>
          <div style={{padding:"12px 16px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <IcoSVG name="repeat" size={14} color={C.accent}/>
              <p style={{fontSize:13,fontWeight:700,color:C.text,margin:0}}>Prochains paiements</p>
            </div>
            <span className="tap" onClick={()=>setTab("stats")} style={{fontSize:12,color:C.accent}}>Tout voir</span>
          </div>
          {upcomingSubs.map(sub=>{
            const days=daysUntil(sub.nextDate);
            const urgCol=days<0?C.red:days<=1?C.orange:days<=3?C.accent:C.sec;
            const dayLbl=days<0?`${Math.abs(days)}j en retard`:days===0?"Aujourd'hui":days===1?"Demain":`Dans ${days}j`;
            return(
              <div key={sub.id} style={{padding:"9px 14px",display:"flex",alignItems:"center",gap:10,borderTop:`1px solid ${C.border}`}}>
                <CatIconBadge cat={{icon:sub.icon,color:sub.color}} size={32}/>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:12,fontWeight:600,margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub.name}</p>
                  <p style={{fontSize:10,color:urgCol,margin:"1px 0 0",fontWeight:500}}>{dayLbl}</p>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  <span style={{fontSize:13,fontWeight:700}}>{fmt(sub.amount)}</span>
                  {days<=1&&<div className="tap" onClick={()=>{
                    addMany([{id:uid(),type:"expense",amount:+sub.amount,description:sub.name,date:today,category:sub.category||null,accountId:null}]);
                    setSubs(p=>p.map(s=>s.id===sub.id?{...s,nextDate:advanceDate(s.nextDate,s.frequency)}:s));
                  }} style={{background:C.greenL,border:`1px solid ${C.green}50`,borderRadius:8,padding:"4px 9px",display:"flex",alignItems:"center",gap:4}}>
                    <IcoSVG name="check" size={11} color={C.green}/>
                    <span style={{fontSize:10,fontWeight:700,color:C.green}}>Payé</span>
                  </div>}
                </div>
              </div>
            );
          })}
        </Card>}

        {/* Recent transactions (3e position) */}
        <Card>
          <div style={{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <p style={{fontSize:13,fontWeight:700,color:C.text,margin:0}}>Transactions récentes</p>
            <span className="tap" onClick={()=>setTab("activity")} style={{fontSize:12,color:C.accent}}>Tout voir</span>
          </div>
          {txns.filter(t=>t.date?.startsWith(mk)).length===0
            ?<p style={{textAlign:"center",fontSize:13,color:C.muted,padding:"24px"}}>Aucune transaction pour {MFULL[month]}</p>
            :txns.filter(t=>t.date?.startsWith(mk)).slice(0,5).map((t,i,arr)=>(
              <TxnRow key={t.id} txn={t} cats={cats} accounts={accounts} last={i===arr.length-1}/>
            ))
          }
        </Card>

        {/* VNP mini chart — en dernier */}
        {vnpHistory.length>=2&&(
          <Card style={{padding:"14px 16px"}}>
            <p style={{fontSize:13,fontWeight:700,color:C.text,margin:"0 0 12px"}}>Évolution valeur nette</p>
            <LineChart data={vnpHistory.slice(-6).map(h=>({v:h.vnp,label:h.month.slice(5)}))} color={C.accent} height={80}/>
          </Card>
        )}

        <div style={{height:8}}/>
      </div>
    </div>
  );
}

// ── ACTIVITY ────────────────────────────────────────────────────────
function Activity({txns,cats,accounts,deleteTxn,editTxn}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());const [month,setMonth]=useState(now.getMonth());
  const [type,setType]=useState("all");const [cat,setCat]=useState("all");const [acct,setAcct]=useState("all");const [q,setQ]=useState("");
  const [selected,setSelected]=useState(null);
  const mk=`${year}-${String(month+1).padStart(2,"0")}`;
  const filtered=txns.filter(t=>{
    if(!t.date?.startsWith(mk))return false;
    if(type!=="all"&&t.type!==type)return false;
    if(cat!=="all"&&t.category!==cat)return false;
    if(acct!=="all"&&t.accountId!==acct)return false;
    if(q&&!(t.description||"").toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  });
  const income=filtered.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=filtered.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const byDate={};filtered.forEach(t=>{if(!byDate[t.date])byDate[t.date]=[];byDate[t.date].push(t);});
  const groups=Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0]));
  function handleDelete(){deleteTxn(selected.id);setSelected(null);}
  function handleEdit(updated){editTxn(updated);setSelected(null);}
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflow:"hidden"}}>
      <div style={{background:C.surf,padding:"14px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <MonthNav year={year} month={month} onChange={(y,m)=>{setYear(y);setMonth(m);}}/>
        <div style={{marginTop:10,display:"flex",gap:5,justifyContent:"center"}}>
          {[{id:"all",label:"Tout"},{id:"expense",label:"Dépenses"},{id:"income",label:"Revenus"},{id:"epargne",label:"Épargne"}].map(f=>(
            <div key={f.id} className="pill tap" onClick={()=>setType(f.id)} style={{background:type===f.id?C.accentL:"transparent",color:type===f.id?C.accent:C.muted,borderColor:type===f.id?C.accent:C.border2,fontSize:11,padding:"5px 12px"}}>
              {f.label}{type===f.id&&f.id!=="all"&&<span style={{marginLeft:4,fontSize:10,fontWeight:700}}>{f.id==="income"?"+"+fmt(income):"-"+fmt(expense)}</span>}
            </div>
          ))}
        </div>
      </div>
      <div className="scroll">
        <div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8,background:C.card,borderRadius:13,padding:"0 12px",border:`1px solid ${C.border}`}}>
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke={C.muted} strokeWidth="1.4"/><path d="M10 10l3 3" stroke={C.muted} strokeWidth="1.4" strokeLinecap="round"/></svg>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher..." style={{flex:1,background:"transparent",border:"none",padding:"10px 0",fontSize:13,color:C.text}}/>
          </div>
          <CatChips cats={cats} value={cat} onChange={setCat} type={type==="all"?null:type}/>
          {accounts.length>1&&(
            <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:2}}>
              <div className="chip tap" onClick={()=>setAcct("all")} style={{background:acct==="all"?C.accentL:C.card2,color:acct==="all"?C.accent:C.muted,borderColor:acct==="all"?C.accent:"transparent"}}>Tous</div>
              {accounts.map(a=>{const b=bankById(a.bank);return(
                <div key={a.id} className="chip tap" onClick={()=>setAcct(a.id)} style={{background:acct===a.id?b.col+"22":C.card2,color:acct===a.id?b.col:C.muted,borderColor:acct===a.id?b.col:"transparent"}}>{a.name.slice(0,12)}</div>
              );})}
            </div>
          )}
          {groups.length===0
            ?<Card style={{padding:"32px",textAlign:"center"}}><p style={{fontSize:13,color:C.muted}}>Aucune transaction pour cette période</p></Card>
            :groups.map(([date,gtxns])=>{
              const d=new Date(date+"T12:00:00");
              return(
                <div key={date}>
                  <p style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",margin:"4px 4px 7px"}}>{DAYS[d.getDay()]} {d.getDate()} {MS[d.getMonth()]} {d.getFullYear()!==now.getFullYear()?d.getFullYear():""}</p>
                  <Card>{gtxns.map((t,i)=><TxnRow key={t.id} txn={t} cats={cats} accounts={accounts} last={i===gtxns.length-1} onTap={setSelected}/>)}</Card>
                </div>
              );
            })
          }
          <div style={{height:8}}/>
        </div>
      </div>
      {selected&&<TxnSheet txn={selected} cats={cats} accounts={accounts} onClose={()=>setSelected(null)} onDelete={handleDelete} onEdit={handleEdit}/>}
    </div>
  );
}

// ── ACCOUNT TYPES ─────────────────────────────────────────────────────
const ATYPES=[
  {id:"cheque",   label:"Chèque",         isDebt:false},
  {id:"epargne",  label:"Épargne",         isDebt:false},
  {id:"celi",     label:"CELI",            isDebt:false},
  {id:"reer",     label:"REER",            isDebt:false},
  {id:"celiapp",  label:"CELIAPP",         isDebt:false},
  {id:"invest",   label:"Investissement",  isDebt:false},
  {id:"credit",   label:"Carte crédit",    isDebt:true},
  {id:"pret",     label:"Prêt / Dette",    isDebt:true},
];
const atypeById=id=>ATYPES.find(t=>t.id===id)||ATYPES[0];

// ── ADD TXN ─────────────────────────────────────────────────────────
function AddTxn({addMany,accounts,cats,onDone}){
  const [type,setType]=useState("expense");
  const [amount,setAmount]=useState("");const [desc,setDesc]=useState("");
  const [cat,setCat]=useState("alim");const [date,setDate]=useState(todayStr());
  const [fromId,setFromId]=useState(accounts[0]?.id||"");
  const [toId,setToId]=useState(accounts[1]?.id||"");
  const [selParent,setSelParent]=useState("alim");

  // Auto-select default category when type changes
  useEffect(()=>{
    const validCats=cats.filter(c=>c.forTypes?.includes(type));
    const firstParent=validCats.find(c=>!c.parentId);
    const newParent=firstParent?.id||"";
    setSelParent(newParent);
    const firstSub=validCats.find(c=>c.parentId===newParent);
    setCat(firstSub?.id||newParent||"");
  },[type]);

  function handleParentSel(parentId){
    setSelParent(parentId);
    const subs=cats.filter(c=>c.parentId===parentId&&c.forTypes?.includes(type));
    setCat(subs.length>0?subs[0].id:parentId);
  }

  function save(){
    const n=parseFloat(amount.replace(",","."));if(!n||isNaN(n))return;
    const txn={id:uid(),type,amount:n,description:desc,category:cat,date,accountId:fromId||null,accountToId:type==="epargne"?(toId||null):null};
    addMany([txn]);onDone();
  }

  const validCats=cats.filter(c=>c.forTypes?.includes(type));
  const parentCats=validCats.filter(c=>!c.parentId);
  const subCats=selParent?cats.filter(c=>c.parentId===selParent&&c.forTypes?.includes(type)):[];
  const tCols={expense:C.red,income:C.green,epargne:C.accent};const tCol=tCols[type];
  const assetAccts=accounts.filter(a=>!atypeById(a.accountType)?.isDebt);

  return(
    <div className="scroll">
      <div style={{background:C.surf,padding:"16px",borderBottom:`1px solid ${C.border}`}}>
        <p style={{fontSize:18,fontWeight:700,color:C.text,margin:"0 0 14px"}}>Nouvelle transaction</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{v:"expense",l:"Dépense",c:C.red,ico:"trending"},{v:"income",l:"Revenu",c:C.green,ico:"dollar"},{v:"epargne",l:"Épargne",c:C.accent,ico:"piggy"}].map(t=>(
            <div key={t.v} className="tap" onClick={()=>setType(t.v)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,padding:"10px 4px",borderRadius:14,fontSize:12,fontWeight:700,background:type===t.v?t.c+"25":"transparent",color:type===t.v?t.c:C.muted,border:`1.5px solid ${type===t.v?t.c:C.border2}`}}>
              <IcoSVG name={t.ico} size={16} color={type===t.v?t.c:"rgba(255,255,255,.3)"}/>
              {t.l}
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
        <Card style={{padding:"16px 18px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Montant (CAD)</p>
          <input autoFocus type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00"
            style={{width:"100%",fontSize:36,fontWeight:800,border:"none",background:"transparent",padding:0,color:tCol,letterSpacing:"-1px"}}/>
        </Card>
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Description</p>
          <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder={type==="income"?"Ex: Salaire iA, livraison...":type==="epargne"?"Ex: Transfert CELI...":"Ex: Épicerie Metro, loyer..."}
            style={{width:"100%",fontSize:15,border:"none",background:"transparent",padding:0,color:C.text}}/>
        </Card>
        {/* Two-level Category Picker */}
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 10px",textTransform:"uppercase",letterSpacing:".07em"}}>Catégorie</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:subCats.length>0?10:0}}>
            {parentCats.map(c=>{
              const isSel=selParent===c.id;
              return(
                <div key={c.id} className="tap" onClick={()=>handleParentSel(c.id)}
                  style={{display:"flex",alignItems:"center",gap:6,padding:"6px 11px",borderRadius:12,background:isSel?c.color+"28":"rgba(255,255,255,.05)",border:`1.5px solid ${isSel?c.color:C.border}`,cursor:"pointer"}}>
                  <IcoSVG name={c.icon||"dollar"} size={13} color={isSel?c.color:"rgba(255,255,255,.35)"}/>
                  <span style={{fontSize:12,color:isSel?c.color:C.sec,fontWeight:isSel?700:400}}>{c.label}</span>
                </div>
              );
            })}
          </div>
          {subCats.length>0&&(
            <div>
              <p style={{fontSize:9,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".06em"}}>Sous-catégorie</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {subCats.map(c=>(
                  <div key={c.id} className="chip tap" onClick={()=>setCat(c.id)}
                    style={{background:cat===c.id?c.color+"28":"rgba(255,255,255,.05)",color:cat===c.id?c.color:C.sec,borderColor:cat===c.id?c.color:C.border,fontWeight:cat===c.id?700:400,fontSize:12}}>
                    {c.label}
                  </div>
                ))}
              </div>
            </div>
          )}
        </Card>
        {/* Date */}
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Date</p>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{fontSize:15,border:"none",background:"transparent",color:C.text,padding:0,width:"100%"}}/>
        </Card>
        {/* Account(s) */}
        {accounts.length>0&&(
          type==="epargne"?(
            <Card style={{padding:"13px 16px"}}>
              <p style={{fontSize:10,color:C.muted,margin:"0 0 10px",textTransform:"uppercase",letterSpacing:".07em"}}>Transfert entre comptes</p>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <div>
                  <p style={{fontSize:10,color:C.muted,margin:"0 0 6px"}}>De</p>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {assetAccts.map(a=>{const b=bankById(a.bank);return(
                      <div key={a.id} className="chip tap" onClick={()=>setFromId(a.id)}
                        style={{background:fromId===a.id?b.col+"25":C.card2,color:fromId===a.id?b.col:C.muted,borderColor:fromId===a.id?b.col:"transparent"}}>
                        {a.name.slice(0,14)}
                      </div>
                    );})}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{flex:1,height:"1px",background:C.border}}/>
                  <span style={{fontSize:12,color:C.muted}}>→</span>
                  <div style={{flex:1,height:"1px",background:C.border}}/>
                </div>
                <div>
                  <p style={{fontSize:10,color:C.muted,margin:"0 0 6px"}}>Vers</p>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {accounts.filter(a=>a.id!==fromId).map(a=>{const b=bankById(a.bank);return(
                      <div key={a.id} className="chip tap" onClick={()=>setToId(a.id)}
                        style={{background:toId===a.id?b.col+"25":C.card2,color:toId===a.id?b.col:C.muted,borderColor:toId===a.id?b.col:"transparent"}}>
                        {a.name.slice(0,14)}
                      </div>
                    );})}
                  </div>
                </div>
              </div>
            </Card>
          ):(
            <Card style={{padding:"13px 16px"}}>
              <p style={{fontSize:10,color:C.muted,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:".07em"}}>{type==="income"?"Compte destinataire":"Compte débité"}</p>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {accounts.map(a=>{const b=bankById(a.bank);return(
                  <div key={a.id} className="chip tap" onClick={()=>setFromId(a.id)}
                    style={{background:fromId===a.id?b.col+"25":C.card2,color:fromId===a.id?b.col:C.muted,borderColor:fromId===a.id?b.col:"transparent"}}>
                    <span style={{fontSize:9,fontWeight:800,marginRight:4,color:fromId===a.id?b.col:C.muted}}>{b.init}</span>
                    {a.name.slice(0,12)}
                  </div>
                );})}
              </div>
            </Card>
          )
        )}
        <div className="tap" onClick={save} style={{background:tCol,color:"#fff",textAlign:"center",padding:"15px",borderRadius:16,fontSize:16,fontWeight:700,marginTop:4}}>Enregistrer</div>
        <div style={{height:12}}/>
      </div>
    </div>
  );
}

// ── BUDGET ──────────────────────────────────────────────────────────
function BudgetView({txns,cats,budgets,setBudgets}){
  const now=new Date();const mk=monthKey();
  const mt=txns.filter(t=>t.date?.startsWith(mk));
  const byinc={};mt.filter(t=>t.type==="income").forEach(t=>{byinc[t.category]=(byinc[t.category]||0)+t.amount;});
  const bycat={};mt.filter(t=>t.type==="expense").forEach(t=>{bycat[t.category]=(bycat[t.category]||0)+t.amount;});
  const bysav={};mt.filter(t=>t.type==="epargne").forEach(t=>{bysav[t.category]=(bysav[t.category]||0)+t.amount;});
  const [editing,setEditing]=useState(null);const [editVal,setEditVal]=useState("");
  const [expanded,setExpanded]=useState({});
  function toggle(id){setExpanded(p=>({...p,[id]:!p[id]}));}
  const expCats=cats.filter(c=>c.forTypes?.includes("expense"));
  const incCats=cats.filter(c=>c.forTypes?.includes("income"));
  const savCats=cats.filter(c=>c.forTypes?.includes("epargne"));
  const incomeActual=mt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const savingsActual=mt.filter(t=>t.type==="epargne").reduce((s,t)=>s+t.amount,0);
  const totalExpBgt=Object.entries(budgets).filter(([k])=>cats.find(c=>c.id===k&&c.forTypes?.includes("expense"))).reduce((s,[,v])=>s+(+v||0),0);
  const incTotalBgt=Object.entries(budgets).filter(([k])=>incCats.find(c=>c.id===k)).reduce((s,[,v])=>s+(+v||0),0);
  const savTotalBgt=Object.entries(budgets).filter(([k])=>savCats.find(c=>c.id===k)).reduce((s,[,v])=>s+(+v||0),0);
  const totalSpent=Object.keys(bycat).reduce((s,c)=>s+(bycat[c]||0),0);
  function save(key){const n=parseFloat(editVal.replace(",","."));setBudgets(p=>({...p,[key]:isNaN(n)||n<=0?0:n}));setEditing(null);}

  // ── helper: chevron icon ──
  function Chevron({open}){return(
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d={open?"M2 4l4 4 4-4":"M4 2l4 4-4 4"} stroke={C.muted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );}

  // ── helper: sub-category row ──
  function subRow(sub,byspent,accentCol,isLast){
    const bgt=+(budgets[sub.id]||0);const spent=byspent[sub.id]||0;
    const pct=bgt>0?Math.min(spent/bgt*100,100):0;
    const col=pct>=100?C.red:pct>=80?C.orange:accentCol;
    return(
      <div key={sub.id} style={{padding:"9px 14px 9px 32px",borderBottom:!isLast?`1px solid ${C.border}`:"none",background:"rgba(255,255,255,.02)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:bgt>0?6:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:10,height:10,borderLeft:`2px solid ${C.border2}`,borderBottom:`2px solid ${C.border2}`,borderRadius:"0 0 0 3px",flexShrink:0,marginRight:2}}/>
            <CatIconBadge cat={sub} size={26}/>
            <div>
              <p style={{fontSize:12,fontWeight:500,margin:0,color:C.sec}}>{sub.label}</p>
              <p style={{fontSize:9,margin:0,color:C.muted}}>{bgt>0?`${fmt(spent)} / ${fmt(bgt)}`:`${fmt(spent)} enregistré`}</p>
            </div>
          </div>
          {editing===sub.id
            ?<div style={{display:"flex",gap:4,alignItems:"center"}}>
              <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>save(sub.id)} onKeyDown={e=>e.key==="Enter"&&save(sub.id)}
                style={{width:72,fontSize:12,fontWeight:700,textAlign:"right",border:"none",background:C.card2,borderRadius:8,padding:"4px 7px",color:C.text}}/>
              <span style={{fontSize:10,color:C.muted}}>$</span>
            </div>
            :<span className="tap" onClick={()=>{setEditing(sub.id);setEditVal(bgt>0?String(bgt):"");}}
              style={{fontSize:12,fontWeight:700,color:bgt>0?C.text:C.muted,background:bgt===0?C.card2:"transparent",padding:bgt===0?"3px 8px":"0",borderRadius:8}}>
              {bgt>0?fmt(bgt):"Définir"}
            </span>
          }
        </div>
        {bgt>0&&<div style={{paddingLeft:22}}>
          <div style={{height:3,background:C.border2,borderRadius:2}}><div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:2,transition:"width .4s"}}/></div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
            <span style={{fontSize:9,color:C.muted}}>{Math.round(pct)}%</span>
            <span style={{fontSize:9,color:pct>=100?C.red:pct>=80?C.orange:C.muted}}>{pct>=100?"Dépassé":"Reste "+fmt(bgt-spent)}</span>
          </div>
        </div>}
      </div>
    );
  }

  // ── helper: render one hierarchical section ──
  function hierSection(typeCats,byspent,accentCol){
    const parents=typeCats.filter(c=>!c.parentId);
    if(parents.length===0)return null;
    const rows=[];
    parents.forEach((par,pi)=>{
      const subs=typeCats.filter(c=>c.parentId===par.id);
      const allIds=[par.id,...subs.map(s=>s.id)];
      const parSpent=allIds.reduce((s,id)=>s+(byspent[id]||0),0);
      const parBgt=allIds.reduce((s,id)=>s+(+(budgets[id]||0)),0);
      const parPct=parBgt>0?Math.min(parSpent/parBgt*100,100):0;
      const parCol=parPct>=100?C.red:parPct>=80?C.orange:accentCol;
      const hasSubs=subs.length>0;
      const isLast=pi===parents.length-1;
      const open=!!expanded[par.id];
      rows.push(
        <React.Fragment key={par.id}>
          <div style={{padding:"11px 14px",borderBottom:(hasSubs&&open)||!isLast?`1px solid ${C.border}`:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:parBgt>0?8:0}}>
              <div style={{display:"flex",alignItems:"center",gap:9,flex:1,minWidth:0}}>
                <div className="tap" onClick={()=>hasSubs&&toggle(par.id)}
                  style={{display:"flex",alignItems:"center",justifyContent:"center",width:22,height:22,flexShrink:0,borderRadius:6,background:hasSubs?C.card2:"transparent",cursor:hasSubs?"pointer":"default"}}>
                  {hasSubs?<Chevron open={open}/>:<div style={{width:12}}/>}
                </div>
                <CatIconBadge cat={par} size={34}/>
                <div style={{minWidth:0,flex:1}}>
                  <p style={{fontSize:13,fontWeight:700,margin:0,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{par.label}</p>
                  <p style={{fontSize:9,margin:0,color:C.muted}}>{parBgt>0?`${fmt(parSpent)} / ${fmt(parBgt)}`:`${fmt(parSpent)} enregistré`}</p>
                </div>
              </div>
              {editing===par.id
                ?<div style={{display:"flex",gap:5,alignItems:"center"}}>
                  <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>save(par.id)} onKeyDown={e=>e.key==="Enter"&&save(par.id)}
                    style={{width:78,fontSize:13,fontWeight:700,textAlign:"right",border:"none",background:C.card2,borderRadius:10,padding:"5px 8px",color:C.text}}/>
                  <span style={{fontSize:11,color:C.muted}}>$</span>
                </div>
                :<span className="tap" onClick={()=>{setEditing(par.id);setEditVal(+(budgets[par.id]||0)>0?String(budgets[par.id]):"");}}
                  style={{fontSize:13,fontWeight:700,color:parBgt>0?C.text:C.muted,background:parBgt===0?C.card2:"transparent",padding:parBgt===0?"4px 10px":"0",borderRadius:10}}>
                  {parBgt>0?fmt(parBgt):"Définir"}
                </span>
              }
            </div>
            {parBgt>0&&<>
              <div style={{height:4,background:C.border2,borderRadius:2,marginLeft:31}}><div style={{width:`${parPct}%`,height:"100%",background:parCol,borderRadius:2,transition:"width .4s"}}/></div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:3,marginLeft:31}}>
                <span style={{fontSize:9,color:C.muted}}>{Math.round(parPct)}%</span>
                <span style={{fontSize:9,color:parPct>=100?C.red:parPct>=80?C.orange:C.muted}}>{parPct>=100?"Dépassé de "+fmt(parSpent-parBgt):"Reste "+fmt(parBgt-parSpent)}</span>
              </div>
            </>}
          </div>
          {open&&subs.map((sub,si)=>subRow(sub,byspent,accentCol,isLast&&si===subs.length-1))}
        </React.Fragment>
      );
    });
    return <Card>{rows}</Card>;
  }

  return(
    <div className="scroll">
      <div style={{background:C.accentB,padding:"18px 20px 22px",borderBottomLeftRadius:28,borderBottomRightRadius:28}}>
        <p style={{fontSize:11,color:"rgba(255,255,255,.5)",margin:"0 0 2px",textTransform:"uppercase",letterSpacing:".07em"}}>Dépenses — {MFULL[now.getMonth()]}</p>
        <p style={{fontSize:30,fontWeight:800,margin:"0 0 3px",letterSpacing:"-1px"}}>{fmt(totalExpBgt)}</p>
        <p style={{fontSize:13,color:totalSpent>totalExpBgt?"#FCA5A5":"#A7F3D0",margin:"0 0 10px"}}>{fmt(totalSpent)} dépensé · {fmt(Math.max(0,totalExpBgt-totalSpent))} restant</p>
        <div style={{height:6,background:"rgba(0,0,0,.3)",borderRadius:3}}>
          <div style={{width:`${Math.min(totalExpBgt>0?totalSpent/totalExpBgt*100:0,100)}%`,height:"100%",background:totalSpent>totalExpBgt?C.red:totalSpent/totalExpBgt>0.8?C.orange:C.green,borderRadius:3,transition:"width .5s"}}/>
        </div>
      </div>
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:12}}>
        <p style={{fontSize:10,color:C.muted,paddingLeft:4}}>Touche un montant pour modifier · ▸ pour dérouler les sous-catégories</p>

        {/* ── REVENUS ── */}
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,paddingLeft:2}}>
            <p style={{fontSize:11,fontWeight:700,color:C.green,textTransform:"uppercase",letterSpacing:".07em",margin:0}}>Revenus</p>

// ── RÉPARTITION VIEW ──────────────────────────────────────────────────
function RepartitionView({txns,cats,budgets}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth());
  const mk=`${year}-${String(month+1).padStart(2,"0")}`;
  const mt=txns.filter(t=>t.date?.startsWith(mk));
  const [rExpanded,setRExpanded]=useState({});
  function rToggle(id){setRExpanded(p=>({...p,[id]:!p[id]}));}
  const byAll={};mt.forEach(t=>{byAll[t.category]=(byAll[t.category]||0)+t.amount;});
  const incTotal=mt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expTotal=mt.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const savTotal=mt.filter(t=>t.type==="epargne").reduce((s,t)=>s+t.amount,0);
  const flux=incTotal-expTotal-savTotal;

  function section(typeId,typeCats,color,title,sectionTotal){
    const parents=typeCats.filter(c=>!c.parentId);
    if(parents.length===0&&sectionTotal===0)return null;
    return(
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7,paddingLeft:2}}>
          <p style={{fontSize:11,fontWeight:700,color,textTransform:"uppercase",letterSpacing:".07em",margin:0}}>{title}</p>
          <p style={{fontSize:14,fontWeight:800,color,margin:0,letterSpacing:"-0.5px"}}>{fmt(sectionTotal)}</p>
        </div>
        <Card>
          {parents.map((par,pi)=>{
            const subs=typeCats.filter(c=>c.parentId===par.id);
            const allIds=[par.id,...subs.map(s=>s.id)];
            const parAmt=allIds.reduce((s,id)=>s+(byAll[id]||0),0);
            const parBgt=budgets?allIds.reduce((s,id)=>s+(+(budgets[id]||0)),0):0;
            const sharePct=sectionTotal>0?parAmt/sectionTotal*100:0;
            const bgtPct=parBgt>0?Math.min(parAmt/parBgt*100,100):0;
            const bgtCol=parBgt>0&&parAmt>parBgt?C.red:color;
            const hasSubs=subs.length>0;
            const isLast=pi===parents.length-1;
            const open=!!rExpanded[par.id];
            return(
              <React.Fragment key={par.id}>
                <div style={{padding:"11px 14px",borderBottom:(hasSubs&&open)||!isLast?`1px solid ${C.border}`:"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:parAmt>0?8:0}}>
                    <div className="tap" onClick={()=>hasSubs&&rToggle(par.id)}
                      style={{width:20,height:20,borderRadius:5,background:hasSubs?C.card2:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:hasSubs?"pointer":"default"}}>
                      {hasSubs&&<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d={open?"M2 4l4 4 4-4":"M4 2l4 4-4 4"} stroke={C.muted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </div>
                    <CatIconBadge cat={par} size={32}/>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:13,fontWeight:600,margin:0,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{par.label}</p>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <p style={{fontSize:13,fontWeight:700,margin:0,color:parAmt>0?color:C.muted}}>{parAmt>0?fmt(parAmt):"—"}</p>
                      {parBgt>0&&<p style={{fontSize:9,color:C.muted,margin:0}}>/{fmt(parBgt)}</p>}
                    </div>
                  </div>
                  {parAmt>0&&(
                    <div style={{marginLeft:29,display:"flex",flexDirection:"column",gap:3}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{flex:1,height:3,background:C.border2,borderRadius:2}}>
                          <div style={{width:`${sharePct}%`,maxWidth:"100%",height:"100%",background:color+"88",borderRadius:2}}/>
                        </div>
                        <span style={{fontSize:9,color:C.muted,flexShrink:0,minWidth:28,textAlign:"right"}}>{Math.round(sharePct)}%</span>
                      </div>
                      {parBgt>0&&<div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{flex:1,height:3,background:C.border2,borderRadius:2}}>
                          <div style={{width:`${bgtPct}%`,height:"100%",background:bgtCol,borderRadius:2,transition:"width .3s"}}/>
                        </div>
                        <span style={{fontSize:9,color:bgtCol,flexShrink:0,minWidth:28,textAlign:"right"}}>{Math.round(bgtPct)}%</span>
                      </div>}
                    </div>
                  )}
                </div>
                {open&&hasSubs&&subs.map((sub,si)=>{
                  const subAmt=byAll[sub.id]||0;
                  const subBgt=budgets?+(budgets[sub.id]||0):0;
                  const subShare=parAmt>0?subAmt/parAmt*100:0;
                  const subBgtPct=subBgt>0?Math.min(subAmt/subBgt*100,100):0;
                  return(
                    <div key={sub.id} style={{padding:"8px 14px 8px 34px",borderBottom:(si<subs.length-1||!isLast)?`1px solid ${C.border}`:"none",background:"rgba(255,255,255,.02)"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:10,height:10,borderLeft:`2px solid ${C.border2}`,borderBottom:`2px solid ${C.border2}`,borderRadius:"0 0 0 3px",flexShrink:0,marginRight:2}}/>
                        <CatIconBadge cat={sub} size={24}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:subAmt>0?4:0}}>
                            <p style={{fontSize:12,fontWeight:500,margin:0,color:C.sec,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub.label}</p>
                            <div style={{textAlign:"right",flexShrink:0,marginLeft:6}}>
                              <p style={{fontSize:12,fontWeight:700,margin:0,color:subAmt>0?color:C.muted}}>{subAmt>0?fmt(subAmt):"—"}</p>
                              {subBgt>0&&<p style={{fontSize:9,color:C.muted,margin:0}}>/{fmt(subBgt)}</p>}
                            </div>
                          </div>
                          {subAmt>0&&subBgt>0&&<div style={{height:3,background:C.border2,borderRadius:2}}><div style={{width:`${subBgtPct}%`,height:"100%",background:subBgt>0&&subAmt>subBgt?C.red:color,borderRadius:2}}/></div>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </React.Fragment>
            );
          })}
        </Card>
      </div>
    );
  }

  return(
    <div className="scroll">
      <div style={{padding:"12px 14px 0"}}>
        <MonthNav year={year} month={month} onChange={(y,m)=>{setYear(y);setMonth(m);}}/>
      </div>
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
          {[{l:"Revenus",v:incTotal,c:C.green},{l:"Dépenses",v:expTotal,c:C.red},{l:"Épargne",v:savTotal,c:C.accent},{l:"Flux net",v:flux,c:flux>=0?C.green:C.red}].map(m=>(
            <div key={m.l} style={{background:C.card,borderRadius:11,padding:"8px 6px",textAlign:"center",border:`1px solid ${C.border}`}}>
              <p style={{fontSize:8,color:C.muted,margin:"0 0 2px",textTransform:"uppercase",letterSpacing:".04em"}}>{m.l}</p>
              <p style={{fontSize:11,fontWeight:800,color:m.c,margin:0,letterSpacing:"-0.3px"}}>{fmt(m.v)}</p>
            </div>
          ))}
        </div>
        {section("income",cats.filter(c=>c.forTypes?.includes("income")),C.green,"Revenus",incTotal)}
        {section("expense",cats.filter(c=>c.forTypes?.includes("expense")),C.red,"Dépenses",expTotal)}
        {section("epargne",cats.filter(c=>c.forTypes?.includes("epargne")),C.accent,"Épargne",savTotal)}
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

          <div key={t.id} className="tap" onClick={()=>setSub(t.id)} style={{padding:"13px 13px 11px",fontSize:12,fontWeight:sub===t.id?700:400,color:sub===t.id?C.accent:C.muted,borderBottom:sub===t.id?`2px solid ${C.accent}`:"2px solid transparent",whiteSpace:"nowrap"}}>

function ChartsView({txns,cats,accounts,vnpHistory}){
  const now=new Date();const yr=now.getFullYear();
  const annual=Array.from({length:12},(_,i)=>{
    const mk=`${yr}-${String(i+1).padStart(2,"0")}`;const mt=txns.filter(t=>t.date?.startsWith(mk));
    return{label:MS[i],inc:mt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),exp:mt.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0)};
  });
  const bycat={};txns.filter(t=>t.date?.startsWith(String(yr))&&t.type==="expense").forEach(t=>{bycat[t.category]=(bycat[t.category]||0)+t.amount;});
  const pieData=Object.entries(bycat).sort((a,b)=>b[1]-a[1]).slice(0,7).map(([id,v])=>{const cat=cats.find(c=>c.id===id)||{color:"#888",label:id,icon:"•"};return{...cat,v};});
  const totalPie=pieData.reduce((s,d)=>s+d.v,0);
  const vnpLine=vnpHistory.slice(-12).map(h=>({v:h.vnp,label:h.month.slice(5)}));
  const assets=accounts.filter(a=>!atypeById(a.accountType)?.isDebt).reduce((s,a)=>s+(+a.balance||0),0);
  const liab=accounts.filter(a=>atypeById(a.accountType)?.isDebt).reduce((s,a)=>s+(+a.balance||0),0);
  return(
    <div className="scroll">
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:11}}>
        <Card style={{padding:"14px 16px"}}>
          <p style={{fontSize:13,fontWeight:700,color:C.text,margin:"0 0 4px"}}>Évolution valeur nette</p>
          <p style={{fontSize:11,color:C.muted,margin:"0 0 12px"}}>Basée sur tes mises à jour de comptes</p>
          <LineChart data={vnpLine} color={C.accent} height={90}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
            {[{l:"Actifs",v:assets,c:C.green},{l:"Dettes",v:liab,c:C.red}].map(m=>(
              <div key={m.l} style={{background:C.card2,borderRadius:12,padding:"9px 12px"}}>
                <p style={{fontSize:10,color:C.muted,margin:"0 0 2px"}}>{m.l}</p>
                <p style={{fontSize:14,fontWeight:700,color:m.c,margin:0}}>{fmt(m.v)}</p>
              </div>
            ))}
          </div>
        </Card>
        <Card style={{padding:"14px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p style={{fontSize:13,fontWeight:700,color:C.text,margin:0}}>Revenus vs Dépenses {yr}</p>
            <div style={{display:"flex",gap:8}}>
              {[{c:C.green,l:"Revenus"},{c:C.red,l:"Dépenses"}].map(m=><div key={m.l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:7,height:7,borderRadius:2,background:m.c}}/><span style={{fontSize:9,color:C.muted}}>{m.l}</span></div>)}
            </div>
          </div>
          <BarChart data={annual}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
            {[{l:"Total revenus",v:annual.reduce((s,d)=>s+d.inc,0),c:C.green},{l:"Total dépenses",v:annual.reduce((s,d)=>s+d.exp,0),c:C.red}].map(m=>(
              <div key={m.l} style={{background:C.card2,borderRadius:12,padding:"9px 12px"}}>
                <p style={{fontSize:10,color:C.muted,margin:"0 0 2px"}}>{m.l}</p>
                <p style={{fontSize:14,fontWeight:700,color:m.c,margin:0}}>{fmt(m.v)}</p>
              </div>
            ))}
          </div>
        </Card>
        {pieData.length>0&&(
          <Card style={{padding:"14px 16px"}}>
            <p style={{fontSize:13,fontWeight:700,color:C.text,margin:"0 0 14px"}}>Dépenses par catégorie {yr}</p>
            <div style={{display:"flex",gap:14,alignItems:"center"}}>
              <MiniPie data={pieData}/>
              <div style={{flex:1,display:"flex",flexDirection:"column",gap:7}}>
                {pieData.map(d=>(
                  <div key={d.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:7,height:7,borderRadius:"50%",background:d.color,flexShrink:0}}/><span style={{fontSize:11,color:C.sec}}>{d.label}</span></div>
                    <div style={{textAlign:"right"}}>
                      <span style={{fontSize:11,fontWeight:700,color:C.text}}>{fmt(d.v)}</span>
                      <span style={{fontSize:9,color:C.muted,display:"block"}}>{Math.round(d.v/totalPie*100)}%</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </Card>
        )}
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

// ── COMPTES VIEW ─────────────────────────────────────────────────────
function ComptesView({accounts,setAccounts}){
  const [form,setForm]=useState(null);
  const assets=accounts.filter(a=>!atypeById(a.accountType)?.isDebt).reduce((s,a)=>s+(+a.balance||0),0);
  const liab=accounts.filter(a=>atypeById(a.accountType)?.isDebt).reduce((s,a)=>s+(+a.balance||0),0);
  const vnp=assets-liab;
  function openAdd(){setForm({id:null,name:"",accountType:"cheque",bank:"other",balance:"",target:""});}
  function openEdit(a){setForm({...a,balance:String(a.balance||0),target:String(a.target||"")});}
  function save(){
    if(!form.name.trim())return;
    const a={id:form.id||uid(),name:form.name.trim(),accountType:form.accountType,bank:form.bank,balance:parseFloat(form.balance)||0,target:parseFloat(form.target)||0};
    if(form.id)setAccounts(p=>p.map(x=>x.id===form.id?a:x));else setAccounts(p=>[...p,a]);setForm(null);
  }
  function del(id){setAccounts(p=>p.filter(a=>a.id!==id));setForm(null);}

  if(form)return(
    <div className="scroll">
      <div style={{background:C.surf,padding:"14px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
        <div className="tap" onClick={()=>setForm(null)} style={{width:34,height:34,borderRadius:11,background:C.card,display:"flex",alignItems:"center",justifyContent:"center",color:C.sec,fontSize:18}}>‹</div>
        <p style={{fontSize:17,fontWeight:700,color:C.text,margin:0}}>{form.id?"Modifier":"Ajouter"} un compte</p>
      </div>
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
        {/* Bank selector */}
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 10px",textTransform:"uppercase",letterSpacing:".07em"}}>Banque / Institution</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {BANKS.map(b=>(
              <div key={b.id} className="chip tap" onClick={()=>setForm(p=>({...p,bank:b.id}))}
                style={{background:form.bank===b.id?b.col+"25":C.card2,color:form.bank===b.id?b.col:C.muted,borderColor:form.bank===b.id?b.col:"transparent",fontWeight:form.bank===b.id?700:400}}>
                {b.label}
              </div>
            ))}
          </div>
        </Card>
        {/* Name */}
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Nom du compte</p>
          <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Ex: Chèque Scotia, CELI WealthSimple..."
            style={{width:"100%",fontSize:15,border:"none",background:"transparent",padding:0,color:C.text}}/>
        </Card>
        {/* Type */}
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 10px",textTransform:"uppercase",letterSpacing:".07em"}}>Type</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {ATYPES.map(t=>(
              <div key={t.id} className="chip tap" onClick={()=>setForm(p=>({...p,accountType:t.id}))}
                style={{background:form.accountType===t.id?C.accentL:C.card2,color:form.accountType===t.id?C.accent:C.muted,borderColor:form.accountType===t.id?C.accent:"transparent",fontWeight:form.accountType===t.id?700:400}}>
                {t.label}
              </div>
            ))}
          </div>
        </Card>
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Solde actuel (CAD)</p>
          <input type="number" value={form.balance} onChange={e=>setForm(p=>({...p,balance:e.target.value}))} placeholder="0.00"
            style={{width:"100%",fontSize:28,fontWeight:800,border:"none",background:"transparent",padding:0,color:C.text,letterSpacing:"-0.5px"}}/>
        </Card>
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Objectif (optionnel)</p>
          <input type="number" value={form.target} onChange={e=>setForm(p=>({...p,target:e.target.value}))} placeholder="Laisser vide si aucun objectif"
            style={{width:"100%",fontSize:15,border:"none",background:"transparent",padding:0,color:C.text}}/>
        </Card>
        <div className="tap" onClick={save} style={{background:C.accent,color:"#fff",textAlign:"center",padding:"15px",borderRadius:16,fontSize:16,fontWeight:700}}>Enregistrer</div>
        {form.id&&<div className="tap" onClick={()=>del(form.id)} style={{textAlign:"center",padding:"12px",borderRadius:16,fontSize:14,fontWeight:600,color:C.red,background:C.redL}}>Supprimer ce compte</div>}
        <div style={{height:12}}/>
      </div>
    </div>
  );
