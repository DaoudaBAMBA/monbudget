// ── CHARTS ──────────────────────────────────────────────────────────
function DonutChart({pct,remaining,budget,spent}){
  const r=46,cx=60,cy=60,circ=2*Math.PI*r,used=Math.min(Math.max(pct,0),100);
  const dash=(used/100)*circ,col=pct>=100?C.red:pct>=80?C.orange:C.accent;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border2} strokeWidth="10"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={col} strokeWidth="10"
          strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`} style={{transition:"stroke-dasharray .5s"}}/>
        <text x={cx} y={cy-7} textAnchor="middle" fill={C.text} fontSize="13" fontWeight="700">{fmt(remaining)}</text>
        <text x={cx} y={cy+8} textAnchor="middle" fill={C.sec} fontSize="8">restant</text>
        <text x={cx} y={cy+20} textAnchor="middle" fill={col} fontSize="9" fontWeight="700">{Math.round(used)}%</text>
      </svg>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,width:"100%"}}>
        {[{l:"Budget",v:budget,c:C.muted},{l:"Dépensé",v:spent,c:col}].map(m=>(
          <div key={m.l} style={{textAlign:"center",background:C.card2,borderRadius:10,padding:"7px 4px"}}>
            <p style={{fontSize:9,color:C.muted,margin:"0 0 2px",textTransform:"uppercase",letterSpacing:".06em"}}>{m.l}</p>
            <p style={{fontSize:12,fontWeight:700,color:m.c,margin:0}}>{fmt(m.v)}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

function BarChart({data}){
  const [hover,setHover]=useState(null);
  if(!data||data.length===0)return null;
  const maxV=Math.max(...data.flatMap(d=>[d.inc,d.exp]),1);
  const H=80,bW=7,gap=3,grW=bW*2+gap+8,totalW=data.length*grW;
  return(
    <div style={{position:"relative"}}>
      {hover!==null&&data[hover]&&(
        <div style={{position:"absolute",top:-40,left:`${(hover/data.length)*100+2}%`,background:C.card2,border:`1px solid ${C.border2}`,borderRadius:8,padding:"4px 8px",zIndex:10,pointerEvents:"none",whiteSpace:"nowrap"}}>
          <p style={{fontSize:10,color:C.green,margin:0}}>+{fmt(data[hover].inc)}</p>
          <p style={{fontSize:10,color:C.red,margin:0}}>-{fmt(data[hover].exp)}</p>
          <p style={{fontSize:9,color:C.muted,margin:0}}>{data[hover].label}</p>
        </div>
      )}
      <svg viewBox={`0 0 ${totalW} ${H+14}`} style={{width:"100%"}} preserveAspectRatio="none">
        {data.map((d,i)=>{
          const x=i*grW+4;const incH=Math.max((d.inc/maxV)*H,1);const expH=Math.max((d.exp/maxV)*H,1);
          return(
            <g key={i} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)} onClick={()=>setHover(hover===i?null:i)} style={{cursor:"pointer"}}>
              <rect x={x} y={0} width={bW*2+gap} height={H+14} fill="transparent"/>
              <rect x={x} y={H-incH} width={bW} height={incH} fill={C.green} rx="2" fillOpacity={hover===i?1:.8}/>
              <rect x={x+bW+gap} y={H-expH} width={bW} height={expH} fill={C.red} rx="2" fillOpacity={hover===i?1:.8}/>
              <text x={x+bW} y={H+12} textAnchor="middle" fontSize="7" fill={C.muted}>{d.label}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function LineChart({data,color=C.accent,height=90}){
  const [hover,setHover]=useState(null);
  if(!data||data.length<2)return<div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:12,textAlign:"center",padding:"0 12px"}}>Mets à jour tes comptes chaque mois pour voir l'évolution de ta valeur nette</div>;
  const vals=data.map(d=>d.v);const min=Math.min(...vals);const max=Math.max(...vals);const range=max-min||1;
  const W=280;const H=height-16;
  const pts=data.map((d,i)=>({x:data.length===1?W/2:(i/(data.length-1))*W,y:H-((d.v-min)/range)*H,label:d.label,v:d.v}));
  const pathD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");
  const lineCol=vals[vals.length-1]>=0?color:C.red;
  return(
    <div style={{position:"relative"}}>
      {hover!==null&&pts[hover]&&(
        <div style={{position:"absolute",top:Math.max(0,pts[hover].y-32),left:`${(pts[hover].x/W)*100}%`,transform:"translateX(-50%)",background:C.card2,border:`1px solid ${C.border2}`,borderRadius:8,padding:"4px 8px",zIndex:10,pointerEvents:"none",whiteSpace:"nowrap"}}>
          <p style={{fontSize:11,fontWeight:700,color:lineCol,margin:0}}>{fmt(pts[hover].v)}</p>
          <p style={{fontSize:9,color:C.muted,margin:0}}>{pts[hover].label}</p>
        </div>
      )}
      <svg viewBox={`0 0 ${W} ${H+16}`} style={{width:"100%",overflow:"visible"}} preserveAspectRatio="xMidYMid meet">
        <path d={pathD} fill="none" stroke={lineCol} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <circle key={i} cx={p.x} cy={p.y} r={hover===i?5:3} fill={lineCol} stroke={C.surf} strokeWidth="1.5"
            onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)} onClick={()=>setHover(hover===i?null:i)}
            style={{cursor:"pointer",transition:"r .1s"}}/>
        ))}
        {pts.map((p,i)=><text key={i} x={p.x} y={H+13} textAnchor="middle" fontSize="8" fill={C.muted}>{p.label}</text>)}
      </svg>
    </div>
  );
}

function MiniPie({data}){
  if(!data||data.length===0)return null;
  const total=data.reduce((s,d)=>s+d.v,0);let cumul=0;const r=44;const cx=50;const cy=50;
  return(
    <svg width="100" height="100" viewBox="0 0 100 100">
      {data.map((d,i)=>{
        const pct=d.v/total;const angle=pct*2*Math.PI;const sa=cumul*2*Math.PI-Math.PI/2;const ea=sa+angle;cumul+=pct;
        const x1=cx+r*Math.cos(sa);const y1=cy+r*Math.sin(sa);const x2=cx+r*Math.cos(ea);const y2=cy+r*Math.sin(ea);
        return<path key={i} d={`M${cx} ${cy} L${x1.toFixed(2)} ${y1.toFixed(2)} A${r} ${r} 0 ${pct>0.5?1:0} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`} fill={d.color} fillOpacity=".9"/>;
      })}
      <circle cx={cx} cy={cy} r={r*.58} fill={C.card}/>
    </svg>
  );
}

}

function Card({children,style}){return<div style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden",...style}}>{children}</div>}

function MonthPickerSheet({year,month,onSelect,onClose}){
  const now=new Date();
  const [py,setPy]=useState(year);
  return(
    <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={onClose}>
      <div className="overlay" style={{position:"absolute",inset:0,background:"rgba(0,0,0,.6)",backdropFilter:"blur(4px)"}}/>
      <div className="sheet" onClick={e=>e.stopPropagation()} style={{background:C.surf,borderRadius:"24px 24px 0 0",padding:"20px 20px 44px",position:"relative",border:`1px solid ${C.border2}`}}>
        <div style={{width:36,height:4,borderRadius:2,background:C.border2,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div className="tap" onClick={()=>setPy(y=>y-1)} style={{width:38,height:38,borderRadius:12,background:C.card2,display:"flex",alignItems:"center",justifyContent:"center",color:C.sec,fontSize:20,border:`1px solid ${C.border2}`}}>‹</div>
          <span style={{fontSize:18,fontWeight:700,color:C.text}}>{py}</span>
          <div className="tap" onClick={()=>setPy(y=>Math.min(y+1,now.getFullYear()))} style={{width:38,height:38,borderRadius:12,background:py>=now.getFullYear()?C.card2+"55":C.card2,display:"flex",alignItems:"center",justifyContent:"center",color:py>=now.getFullYear()?C.muted:C.sec,fontSize:20,border:`1px solid ${C.border2}`,opacity:py>=now.getFullYear()?.35:1}}>›</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {MS.map((m,i)=>{
            const fut=py>now.getFullYear()||(py===now.getFullYear()&&i>now.getMonth());
            const sel=py===year&&i===month;
            return(
              <div key={i} className={fut?"":"tap"} onClick={()=>!fut&&onSelect(py,i)}
                style={{textAlign:"center",padding:"11px 4px",borderRadius:12,fontSize:13,fontWeight:sel?700:400,
                  background:sel?C.accent:fut?"transparent":C.card2,
                  color:sel?"#fff":fut?C.muted:C.sec,cursor:fut?"default":"pointer"}}>
                {m}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function MonthNav({year,month,onChange}){
  const [showPicker,setShowPicker]=useState(false);
  function prev(){if(month===0)onChange(year-1,11);else onChange(year,month-1);}
  function next(){const n=new Date();if(year>n.getFullYear()||(year===n.getFullYear()&&month>=n.getMonth()))return;if(month===11)onChange(year+1,0);else onChange(year,month+1);}
  const now=new Date();const isNow=year===now.getFullYear()&&month===now.getMonth();
  return(
    <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
        <div className="tap" onClick={prev} style={{width:34,height:34,borderRadius:11,background:C.card2,display:"flex",alignItems:"center",justifyContent:"center",color:C.sec,fontSize:18,border:`1px solid ${C.border2}`}}>‹</div>
        <div className="tap" onClick={()=>setShowPicker(true)} style={{textAlign:"center",minWidth:130}}>
          <p style={{fontSize:16,fontWeight:700,margin:0,color:C.text}}>{MFULL[month]} {year}</p>
          {isNow
            ?<p style={{fontSize:10,color:C.accent,margin:"1px 0 0",fontWeight:500}}>Mois en cours</p>
            :<p style={{fontSize:10,color:C.muted,margin:"1px 0 0",opacity:.7}}>
              <svg style={{verticalAlign:"middle",marginRight:3}} width="10" height="10" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" strokeWidth="1.5"/><path d="M1 7h14M5 1v4M11 1v4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
              Choisir
            </p>
          }
        </div>
        <div className="tap" onClick={next} style={{width:34,height:34,borderRadius:11,background:isNow?C.card2+"88":C.card2,display:"flex",alignItems:"center",justifyContent:"center",color:isNow?C.muted:C.sec,fontSize:18,border:`1px solid ${C.border2}`,opacity:isNow?.3:1}}>›</div>
      </div>
      {showPicker&&<MonthPickerSheet year={year} month={month} onSelect={(y,m)=>{onChange(y,m);setShowPicker(false);}} onClose={()=>setShowPicker(false)}/>}
    </>
  );
}

function CatChips({cats,value,onChange,type}){
  const visible=type?cats.filter(c=>!c.forTypes||c.forTypes.includes(type)):cats;
  return(
    <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:2}}>
      {[{id:"all",label:"Tout",color:C.accent},...visible].map(c=>(
        <div key={c.id} className="chip tap" onClick={()=>onChange(c.id)}
          style={{background:value===c.id?(c.color||C.accent)+"25":C.card2,color:value===c.id?(c.color||C.accent):C.muted,borderColor:value===c.id?(c.color||C.accent):"transparent",fontWeight:value===c.id?600:400}}>
          {c.icon?c.icon+" ":""}{c.label}
        </div>
      ))}
    </div>
  );
}

function TxnRow({txn,cats,accounts,last,onTap}){
  const cat=cats.find(c=>c.id===txn.category)||cats[3];
  const isInc=txn.type==="income";const isSav=txn.type==="epargne";
  const fromAcct=accounts.find(a=>a.id===txn.accountId);
  const toAcct=accounts.find(a=>a.id===txn.accountToId);
  return(
    <div className="tap" onClick={()=>onTap&&onTap(txn)} style={{display:"flex",alignItems:"center",gap:11,padding:"11px 14px",borderBottom:last?"none":`1px solid ${C.border}`,active:{background:C.card2}}}>
      <CatIconBadge cat={cat} size={40}/>
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontSize:14,margin:0,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontWeight:500}}>{txn.description||cat.label}</p>
        <div style={{display:"flex",gap:5,marginTop:3,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:10,padding:"1px 7px",borderRadius:10,background:cat.color+"20",color:cat.color,fontWeight:600}}>{cat.label}</span>
          {fromAcct&&<span style={{fontSize:10,color:C.muted}}>{isSav?"de ":""}{fromAcct.name.slice(0,10)}{toAcct?" → "+toAcct.name.slice(0,10):""}</span>}
          <span style={{fontSize:10,color:C.muted,opacity:.7}}>{txn.date}</span>
        </div>
      </div>
      <p style={{fontSize:14,fontWeight:700,margin:0,flexShrink:0,color:isInc?C.green:isSav?C.accent:C.text}}>{isInc?"+":"-"}{fmt(txn.amount)}</p>
    </div>
  );
}

// ── TXN DETAIL SHEET ──────────────────────────────────────────────────
function TxnSheet({txn,cats,accounts,onClose,onDelete}){
  const cat=cats.find(c=>c.id===txn.category)||cats[3];
  const isInc=txn.type==="income";const isSav=txn.type==="epargne";
  const fromAcct=accounts.find(a=>a.id===txn.accountId);

    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={onClose}>

      <div className="sheet" onClick={e=>e.stopPropagation()} style={{background:C.surf,borderRadius:"24px 24px 0 0",padding:"20px 20px 36px",position:"relative",border:`1px solid ${C.border2}`}}>
        <div style={{width:36,height:4,borderRadius:2,background:C.border2,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20}}>
          <CatIconBadge cat={cat} size={52}/>
          <div style={{flex:1}}>
            <p style={{fontSize:17,fontWeight:700,margin:"0 0 3px",color:C.text}}>{txn.description||cat.label}</p>
            <p style={{fontSize:13,color:C.muted,margin:0}}>{cat.label} · {txn.date}</p>
          </div>
          <p style={{fontSize:22,fontWeight:800,color:isInc?C.green:isSav?C.accent:C.text,flexShrink:0}}>{isInc?"+":"-"}{fmt(txn.amount)}</p>
        </div>
        {(fromAcct||toAcct)&&(
          <div style={{background:C.card2,borderRadius:14,padding:"12px 14px",marginBottom:14}}>
            {fromAcct&&<p style={{fontSize:12,color:C.sec,margin:"0 0 2px"}}>{isSav?"De : ":"Compte : "}<span style={{color:C.text,fontWeight:600}}>{fromAcct.name}</span></p>}
            {isSav&&toAcct&&<p style={{fontSize:12,color:C.sec,margin:0}}>Vers : <span style={{color:C.text,fontWeight:600}}>{toAcct.name}</span></p>}
          </div>
        )}
        {confirm
          ?<div>
            <p style={{fontSize:14,color:C.red,textAlign:"center",marginBottom:14,fontWeight:500}}>Supprimer cette transaction ? Cette action est irréversible et le solde du compte sera ajusté.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div className="tap" onClick={()=>setConfirm(false)} style={{textAlign:"center",padding:"13px",borderRadius:14,background:C.card2,fontSize:14,fontWeight:600,color:C.sec}}>Annuler</div>
              <div className="tap" onClick={onDelete} style={{textAlign:"center",padding:"13px",borderRadius:14,background:C.red,fontSize:14,fontWeight:700,color:"#fff"}}>Supprimer</div>
            </div>
          </div>
          :<div className="tap" onClick={()=>setConfirm(true)} style={{textAlign:"center",padding:"14px",borderRadius:14,background:C.redL,fontSize:15,fontWeight:600,color:C.red,border:`1px solid ${C.red}33`}}>
            Supprimer la transaction
          </div>
        }
      </div>
    </div>
  );
}

// ── HOME ────────────────────────────────────────────────────────────
function Home({txns,cats,accounts,budgets,vnpHistory,setTab}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth());
  const mk=`${year}-${String(month+1).padStart(2,"0")}`;
  const mt=txns.filter(t=>t.date?.startsWith(mk));
  const income=mt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expenses=mt.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const savings=mt.filter(t=>t.type==="epargne").reduce((s,t)=>s+t.amount,0);
  const assets=accounts.filter(a=>atypeById(a.accountType).isDebt===false&&a.balance!=null).reduce((s,a)=>s+(+a.balance||0),0);
  const liab=accounts.filter(a=>atypeById(a.accountType)?.isDebt===true).reduce((s,a)=>s+(+a.balance||0),0);
  const vnp=assets-liab;
  const totalBgt=Object.values(budgets).reduce((s,v)=>s+(+v||0),0);
  const bycat={};mt.filter(t=>t.type==="expense").forEach(t=>{bycat[t.category]=(bycat[t.category]||0)+t.amount;});
  const topCats=Object.entries(bycat).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const budgetPct=totalBgt>0?expenses/totalBgt*100:0;
  return(
    <div className="scroll">
      <div style={{background:C.accentB,padding:"16px 18px 24px",borderBottomLeftRadius:28,borderBottomRightRadius:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <p style={{fontSize:11,color:"rgba(255,255,255,.5)",margin:"0 0 3px",textTransform:"uppercase",letterSpacing:".07em"}}>Valeur nette personnelle</p>
            <p style={{fontSize:36,fontWeight:800,margin:0,letterSpacing:"-1.5px",color:vnp>=0?"#A7F3D0":"#FCA5A5"}}>{fmt(vnp)}</p>
          </div>
        </div>
        <MonthNav year={year} month={month} onChange={(y,m)=>{setYear(y);setMonth(m);}}/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:14}}>
          {[{l:"Revenus",v:income,c:"#6EE7B7"},{l:"Dépenses",v:expenses,c:"#FCA5A5"},{l:"Épargne",v:savings,c:"#C4B5FD"}].map(m=>(
            <div key={m.l} style={{background:"rgba(0,0,0,.2)",borderRadius:12,padding:"9px 8px"}}>
              <p style={{fontSize:9,color:"rgba(255,255,255,.5)",margin:"0 0 3px",textTransform:"uppercase",letterSpacing:".05em"}}>{m.l}</p>
              <p style={{fontSize:13,fontWeight:700,margin:0,color:m.c}}>{fmt(m.v)}</p>
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:11}}>
        {/* Budget donut */}
        {totalBgt>0&&(
          <Card>
            <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <p style={{fontSize:13,fontWeight:700,color:C.text,margin:0}}>Budget — {MFULL[month]}</p>
              <span className="tap" onClick={()=>setTab("budget")} style={{fontSize:12,color:C.accent}}>Gérer</span>
            </div>
            <div style={{padding:"14px 16px",display:"flex",gap:18,alignItems:"center"}}>
              <DonutChart pct={budgetPct} remaining={Math.max(0,totalBgt-expenses)} budget={totalBgt} spent={expenses}/>
              <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
                {topCats.length>0?topCats.map(([id,amt])=>{
                  const cat=cats.find(c=>c.id===id);if(!cat)return null;
                  const pct2=totalBgt>0?Math.min(amt/totalBgt*100,100):0;
                  return(
                    <div key={id}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:11,color:C.sec}}>{cat.icon} {cat.label}</span>
                        <span style={{fontSize:11,fontWeight:600,color:C.text}}>{fmt(amt)}</span>
                      </div>
                      <div style={{height:3,background:C.border2,borderRadius:2}}><div style={{width:`${pct2}%`,height:"100%",background:cat.color,borderRadius:2}}/></div>
                    </div>
                  );
                }):<p style={{fontSize:12,color:C.muted,textAlign:"center"}}>Aucune dépense ce mois</p>}
              </div>
            </div>
          </Card>
        )}
        {/* Accounts */}
        {accounts.length>0&&(
          <Card>
            <div style={{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <p style={{fontSize:13,fontWeight:700,color:C.text,margin:0}}>Comptes</p>
              <span className="tap" onClick={()=>setTab("stats")} style={{fontSize:12,color:C.accent}}>Gérer</span>
            </div>
            {accounts.slice(0,5).map((a,i)=>(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 16px",borderBottom:i<Math.min(4,accounts.length-1)?`1px solid ${C.border}`:"none"}}>
                <BankLogo bankId={a.bank} name={a.name} size={36}/>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:13,margin:0,fontWeight:500,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.name}</p>
                  <p style={{fontSize:10,margin:0,color:C.muted}}>{bankById(a.bank).label}</p>
                </div>
                <p style={{fontSize:13,fontWeight:700,margin:0,color:atypeById(a.accountType)?.isDebt?C.red:C.text}}>{atypeById(a.accountType)?.isDebt?"-":""}{fmt(a.balance)}</p>
              </div>
            ))}
            {accounts.length>5&&<p style={{textAlign:"center",fontSize:11,color:C.muted,padding:"10px"}}>+{accounts.length-5} autres</p>}
          </Card>
        )}
        {/* VNP mini */}
        {vnpHistory.length>=2&&(
          <Card style={{padding:"14px 16px"}}>
            <p style={{fontSize:13,fontWeight:700,color:C.text,margin:"0 0 12px"}}>Évolution valeur nette</p>
            <LineChart data={vnpHistory.slice(-6).map(h=>({v:h.vnp,label:h.month.slice(5)}))} color={C.accent} height={80}/>
          </Card>
        )}
        {/* Recent */}
        <Card>
          <div style={{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <p style={{fontSize:13,fontWeight:700,color:C.text,margin:0}}>Transactions récentes</p>
            <span className="tap" onClick={()=>setTab("activity")} style={{fontSize:12,color:C.accent}}>Tout voir</span>
          </div>
          {txns.filter(t=>t.date?.startsWith(mk)).length===0
            ?<p style={{textAlign:"center",fontSize:13,color:C.muted,padding:"24px"}}>Aucune transaction pour {MFULL[month]}</p>
            :txns.filter(t=>t.date?.startsWith(mk)).slice(0,5).map((t,i,arr)=>(
              <TxnRow key={t.id} txn={t} cats={cats} accounts={accounts} last={i===arr.length-1}/>
            ))
          }
        </Card>
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

// ── ACTIVITY ────────────────────────────────────────────────────────
function Activity({txns,cats,accounts,deleteTxn}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());const [month,setMonth]=useState(now.getMonth());
  const [type,setType]=useState("all");const [cat,setCat]=useState("all");const [acct,setAcct]=useState("all");const [q,setQ]=useState("");
  const [selected,setSelected]=useState(null);
  const mk=`${year}-${String(month+1).padStart(2,"0")}`;
  const filtered=txns.filter(t=>{
    if(!t.date?.startsWith(mk))return false;
    if(type!=="all"&&t.type!==type)return false;
    if(cat!=="all"&&t.category!==cat)return false;
    if(acct!=="all"&&t.accountId!==acct)return false;
    if(q&&!(t.description||"").toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  });
  const income=filtered.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=filtered.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const byDate={};filtered.forEach(t=>{if(!byDate[t.date])byDate[t.date]=[];byDate[t.date].push(t);});
  const groups=Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0]));
  function handleDelete(){deleteTxn(selected.id);setSelected(null);}
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflow:"hidden"}}>
      <div style={{background:C.surf,padding:"14px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <MonthNav year={year} month={month} onChange={(y,m)=>{setYear(y);setMonth(m);}}/>
        <div style={{marginTop:10,display:"flex",gap:5,justifyContent:"center"}}>
          {[{id:"all",label:"Tout"},{id:"expense",label:"Dépenses"},{id:"income",label:"Revenus"},{id:"epargne",label:"Épargne"}].map(f=>(
            <div key={f.id} className="pill tap" onClick={()=>setType(f.id)} style={{background:type===f.id?C.accentL:"transparent",color:type===f.id?C.accent:C.muted,borderColor:type===f.id?C.accent:C.border2,fontSize:11,padding:"5px 12px"}}>
              {f.label}{type===f.id&&f.id!=="all"&&<span style={{marginLeft:4,fontSize:10,fontWeight:700}}>{f.id==="income"?"+"+fmt(income):"-"+fmt(expense)}</span>}
            </div>
          ))}
        </div>
      </div>
      <div className="scroll">
        <div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8,background:C.card,borderRadius:13,padding:"0 12px",border:`1px solid ${C.border}`}}>
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke={C.muted} strokeWidth="1.4"/><path d="M10 10l3 3" stroke={C.muted} strokeWidth="1.4" strokeLinecap="round"/></svg>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher..." style={{flex:1,background:"transparent",border:"none",padding:"10px 0",fontSize:13,color:C.text}}/>
          </div>
          <CatChips cats={cats} value={cat} onChange={setCat} type={type==="all"?null:type}/>
          {accounts.length>1&&(
            <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:2}}>
              <div className="chip tap" onClick={()=>setAcct("all")} style={{background:acct==="all"?C.accentL:C.card2,color:acct==="all"?C.accent:C.muted,borderColor:acct==="all"?C.accent:"transparent"}}>Tous</div>
              {accounts.map(a=>{const b=bankById(a.bank);return(
                <div key={a.id} className="chip tap" onClick={()=>setAcct(a.id)} style={{background:acct===a.id?b.col+"22":C.card2,color:acct===a.id?b.col:C.muted,borderColor:acct===a.id?b.col:"transparent"}}>{a.name.slice(0,12)}</div>
              );})}
            </div>
          )}
          {groups.length===0
            ?<Card style={{padding:"32px",textAlign:"center"}}><p style={{fontSize:13,color:C.muted}}>Aucune transaction pour cette période</p></Card>
            :groups.map(([date,gtxns])=>{
              const d=new Date(date+"T12:00:00");
              return(
                <div key={date}>
                  <p style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",margin:"4px 4px 7px"}}>{DAYS[d.getDay()]} {d.getDate()} {MS[d.getMonth()]} {d.getFullYear()!==now.getFullYear()?d.getFullYear():""}</p>
                  <Card>{gtxns.map((t,i)=><TxnRow key={t.id} txn={t} cats={cats} accounts={accounts} last={i===gtxns.length-1} onTap={setSelected}/>)}</Card>
                </div>
              );
            })
          }
          <div style={{height:8}}/>
        </div>
      </div>
      {selected&&<TxnSheet txn={selected} cats={cats} accounts={accounts} onClose={()=>setSelected(null)} onDelete={handleDelete}/>}
    </div>
  );
}

// ── ACCOUNT TYPES ─────────────────────────────────────────────────────
const ATYPES=[
  {id:"cheque",   label:"Chèque",         isDebt:false},
  {id:"epargne",  label:"Épargne",         isDebt:false},
  {id:"celi",     label:"CELI",            isDebt:false},
  {id:"reer",     label:"REER",            isDebt:false},
  {id:"celiapp",  label:"CELIAPP",         isDebt:false},
  {id:"invest",   label:"Investissement",  isDebt:false},
  {id:"credit",   label:"Carte crédit",    isDebt:true},

];

// ── ADD TXN ─────────────────────────────────────────────────────────
function AddTxn({addMany,accounts,cats,onDone}){
  const [type,setType]=useState("expense");
  const [amount,setAmount]=useState("");const [desc,setDesc]=useState("");
  const [cat,setCat]=useState("alim");const [date,setDate]=useState(todayStr());
  const [fromId,setFromId]=useState(accounts[0]?.id||"");
  const [toId,setToId]=useState(accounts[1]?.id||"");

  // Auto-select default category when type changes
  useEffect(()=>{
    const validCats=cats.filter(c=>!c.forTypes||c.forTypes.includes(type));
    if(!validCats.find(c=>c.id===cat)){setCat(validCats[0]?.id||"alim");}
  },[type]);

  function save(){
    const n=parseFloat(amount.replace(",","."));if(!n||isNaN(n))return;
    const txn={id:uid(),type,amount:n,description:desc,category:cat,date,accountId:fromId||null,accountToId:type==="epargne"?(toId||null):null};
    addMany([txn]);onDone();
  }

  const validCats=cats.filter(c=>!c.forTypes||c.forTypes.includes(type));
  const tCols={expense:C.red,income:C.green,epargne:C.accent};const tCol=tCols[type];
  const assetAccts=accounts.filter(a=>!atypeById(a.accountType)?.isDebt);

  return(
    <div className="scroll">
      <div style={{background:C.surf,padding:"16px",borderBottom:`1px solid ${C.border}`}}>
        <p style={{fontSize:18,fontWeight:700,color:C.text,margin:"0 0 14px"}}>Nouvelle transaction</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{v:"expense",l:"Dépense 💸",c:C.red},{v:"income",l:"Revenu 💰",c:C.green},{v:"epargne",l:"Épargne 🏦",c:C.accent}].map(t=>(
            <div key={t.v} className="tap" onClick={()=>setType(t.v)} style={{textAlign:"center",padding:"10px 4px",borderRadius:14,fontSize:12,fontWeight:700,background:type===t.v?t.c+"25":"transparent",color:type===t.v?t.c:C.muted,border:`1.5px solid ${type===t.v?t.c:C.border2}`,lineHeight:1.3}}>
              {t.l}
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
        <Card style={{padding:"16px 18px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Montant (CAD)</p>
          <input autoFocus type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00"
            style={{width:"100%",fontSize:36,fontWeight:800,border:"none",background:"transparent",padding:0,color:tCol,letterSpacing:"-1px"}}/>
        </Card>
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Description</p>
          <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder={type==="income"?"Ex: Salaire iA, livraison...":type==="epargne"?"Ex: Transfert CELI...":"Ex: Épicerie Metro, loyer..."}
            style={{width:"100%",fontSize:15,border:"none",background:"transparent",padding:0,color:C.text}}/>
        </Card>
        {/* Category */}
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 10px",textTransform:"uppercase",letterSpacing:".07em"}}>Catégorie</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {validCats.map(c=>(
              <div key={c.id} className="chip tap" onClick={()=>setCat(c.id)}
                style={{background:cat===c.id?c.color+"28":"rgba(255,255,255,.05)",color:cat===c.id?c.color:C.sec,borderColor:cat===c.id?c.color:C.border,fontWeight:cat===c.id?700:400,fontSize:12}}>
                {c.icon} {c.label}
              </div>
            ))}
          </div>
        </Card>
        {/* Date */}
        <Card style={{padding:"13px 16px"}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Date</p>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{fontSize:15,border:"none",background:"transparent",color:C.text,padding:0,width:"100%"}}/>
        </Card>
        {/* Account(s) */}
        {accounts.length>0&&(
          type==="epargne"?(
            <Card style={{padding:"13px 16px"}}>
              <p style={{fontSize:10,color:C.muted,margin:"0 0 10px",textTransform:"uppercase",letterSpacing:".07em"}}>Transfert entre comptes</p>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <div>
                  <p style={{fontSize:10,color:C.muted,margin:"0 0 6px"}}>De</p>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {assetAccts.map(a=>{const b=bankById(a.bank);return(
                      <div key={a.id} className="chip tap" onClick={()=>setFromId(a.id)}
                        style={{background:fromId===a.id?b.col+"25":C.card2,color:fromId===a.id?b.col:C.muted,borderColor:fromId===a.id?b.col:"transparent"}}>
                        {a.name.slice(0,14)}

                    );})}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{flex:1,height:"1px",background:C.border}}/>
                  <span style={{fontSize:12,color:C.muted}}>→</span>
                  <div style={{flex:1,height:"1px",background:C.border}}/>
                </div>
                <div>
                  <p style={{fontSize:10,color:C.muted,margin:"0 0 6px"}}>Vers</p>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {accounts.filter(a=>a.id!==fromId).map(a=>{const b=bankById(a.bank);return(
                      <div key={a.id} className="chip tap" onClick={()=>setToId(a.id)}
                        style={{background:toId===a.id?b.col+"25":C.card2,color:toId===a.id?b.col:C.muted,borderColor:toId===a.id?b.col:"transparent"}}>
                        {a.name.slice(0,14)}
                      </div>
                    );})}
                  </div>
                </div>
              </div>
            </Card>
          ):(
            <Card style={{padding:"13px 16px"}}>
              <p style={{fontSize:10,color:C.muted,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:".07em"}}>{type==="income"?"Compte destinataire":"Compte débité"}</p>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {accounts.map(a=>{const b=bankById(a.bank);return(
                  <div key={a.id} className="chip tap" onClick={()=>setFromId(a.id)}
                    style={{background:fromId===a.id?b.col+"25":C.card2,color:fromId===a.id?b.col:C.muted,borderColor:fromId===a.id?b.col:"transparent"}}>
                    <span style={{fontSize:9,fontWeight:800,marginRight:4,color:fromId===a.id?b.col:C.muted}}>{b.init}</span>
                    {a.name.slice(0,12)}
                  </div>
                );})}
              </div>
            </Card>
          )
        )}
        <div className="tap" onClick={save} style={{background:tCol,color:"#fff",textAlign:"center",padding:"15px",borderRadius:16,fontSize:16,fontWeight:700,marginTop:4}}>Enregistrer</div>
        <div style={{height:12}}/>
      </div>
    </div>
  );
}

// ── BUDGET ──────────────────────────────────────────────────────────
function BudgetView({txns,cats,budgets,setBudgets}){
  const now=new Date();const mk=monthKey();
  const mt=txns.filter(t=>t.date?.startsWith(mk));
  const incomeActual=mt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const bycat={};mt.filter(t=>t.type==="expense").forEach(t=>{bycat[t.category]=(bycat[t.category]||0)+t.amount;});
  const [editing,setEditing]=useState(null);const [editVal,setEditVal]=useState("");
  const incomeBgt=+(budgets["__income"]||0);
  const totalExpBgt=Object.entries(budgets).filter(([k])=>k!=="__income").reduce((s,[,v])=>s+(+v||0),0);
  const totalSpent=Object.keys(bycat).reduce((s,c)=>s+(bycat[c]||0),0);
  function save(key){const n=parseFloat(editVal.replace(",","."));setBudgets(p=>({...p,[key]:isNaN(n)||n<=0?0:n}));setEditing(null);}
  const expCats=cats.filter(c=>c.forTypes?.includes("expense"));
  return(
    <div className="scroll">
      <div style={{background:C.accentB,padding:"18px 20px 24px",borderBottomLeftRadius:28,borderBottomRightRadius:28}}>
        <p style={{fontSize:11,color:"rgba(255,255,255,.5)",margin:"0 0 2px",textTransform:"uppercase",letterSpacing:".07em"}}>Budget — {MFULL[now.getMonth()]}</p>
        <p style={{fontSize:32,fontWeight:800,margin:"0 0 3px",letterSpacing:"-1px"}}>{fmt(totalExpBgt)}</p>
        <p style={{fontSize:13,color:totalSpent>totalExpBgt?"#FCA5A5":"#A7F3D0",margin:"0 0 10px"}}>{fmt(totalSpent)} dépensé · {fmt(Math.max(0,totalExpBgt-totalSpent))} restant</p>
        <div style={{height:7,background:"rgba(0,0,0,.3)",borderRadius:4}}>
          <div style={{width:`${Math.min(totalExpBgt>0?totalSpent/totalExpBgt*100:0,100)}%`,height:"100%",background:totalSpent>totalExpBgt?C.red:totalSpent/totalExpBgt>0.8?C.orange:C.green,borderRadius:4,transition:"width .5s"}}/>
        </div>
      </div>
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
        {/* Revenue target */}
        <Card style={{padding:"13px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <CatIconBadge cat={{id:"revenus",color:C.green}} size={34}/>
              <div>
                <p style={{fontSize:14,fontWeight:600,margin:0,color:C.text}}>Revenus visés</p>
                <p style={{fontSize:11,margin:0,color:incomeBgt>0&&incomeActual>=incomeBgt?C.green:C.muted}}>
                  {incomeBgt>0?`${fmt(incomeActual)} reçu / ${fmt(incomeBgt)} visé`:"Pas de cible définie"}
                </p>
              </div>
            </div>
            {editing==="__income"
              ?<div style={{display:"flex",gap:6,alignItems:"center"}}>
                <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>save("__income")} onKeyDown={e=>e.key==="Enter"&&save("__income")}
                  style={{width:90,fontSize:15,fontWeight:700,textAlign:"right",border:"none",background:C.card2,borderRadius:10,padding:"6px 10px",color:C.text}}/>
                <span style={{fontSize:11,color:C.muted}}>$</span>
              </div>
              :<span className="tap" onClick={()=>{setEditing("__income");setEditVal(incomeBgt>0?String(incomeBgt):"");}}
                style={{fontSize:14,fontWeight:700,color:incomeBgt>0?C.green:C.muted,background:incomeBgt===0?C.card2:"transparent",padding:incomeBgt===0?"6px 12px":"0",borderRadius:10}}>
                {incomeBgt>0?fmt(incomeBgt):"Définir"}
              </span>
            }
          </div>
          {incomeBgt>0&&(
            <div style={{marginTop:10}}>
              <div style={{height:4,background:C.border2,borderRadius:2}}><div style={{width:`${Math.min(incomeActual/incomeBgt*100,100)}%`,height:"100%",background:C.green,borderRadius:2}}/></div>
              <p style={{fontSize:10,color:C.muted,margin:"3px 0 0"}}>{Math.round(incomeActual/incomeBgt*100)}% reçu</p>
            </div>
          )}
        </Card>
        <p style={{fontSize:11,color:C.muted,paddingLeft:4}}>Touche un montant pour le modifier</p>
        {/* Expense budgets */}
        <Card>
          {expCats.map((cat,i,arr)=>{
            const bgt=+(budgets[cat.id]||0);const spent=bycat[cat.id]||0;
            const pct=bgt>0?Math.min(spent/bgt*100,100):0;
            const col=pct>=100?C.red:pct>=80?C.orange:C.green;const isEdit=editing===cat.id;
            return(
              <div key={cat.id} style={{padding:"12px 16px",borderBottom:i<arr.length-1?`1px solid ${C.border}`:"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:bgt>0?8:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <CatIconBadge cat={cat} size={34}/>
                    <div>
                      <p style={{fontSize:13,fontWeight:500,margin:0,color:C.text}}>{cat.label}</p>
                      <p style={{fontSize:10,margin:0,color:C.muted}}>{bgt>0?`${fmt(spent)} / ${fmt(bgt)}`:"Aucun budget"}</p>
                    </div>
                  </div>
                  {isEdit
                    ?<div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>save(cat.id)} onKeyDown={e=>e.key==="Enter"&&save(cat.id)}
                        style={{width:85,fontSize:14,fontWeight:700,textAlign:"right",border:"none",background:C.card2,borderRadius:10,padding:"6px 9px",color:C.text}}/>
                      <span style={{fontSize:11,color:C.muted}}>$</span>
                    </div>
                    :<span className="tap" onClick={()=>{setEditing(cat.id);setEditVal(bgt>0?String(bgt):"");}}
                      style={{fontSize:14,fontWeight:700,color:bgt>0?C.text:C.muted,background:bgt===0?C.card2:"transparent",padding:bgt===0?"5px 11px":"0",borderRadius:10}}>
                      {bgt>0?fmt(bgt):"Définir"}
                    </span>
                  }
                </div>
                {bgt>0&&(
                  <>
                    <div style={{height:4,background:C.border2,borderRadius:2}}><div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:2,transition:"width .4s"}}/></div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                      <span style={{fontSize:10,color:C.muted}}>{Math.round(pct)}%</span>
                      <span style={{fontSize:10,color:pct>=100?C.red:pct>=80?C.orange:C.muted}}>{pct>=100?"Dépassé de "+fmt(spent-bgt):"Reste "+fmt(bgt-spent)}</span>
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </Card>
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

// ── COMPTES VIEW ─────────────────────────────────────────────────────
function ComptesView({accounts,setAccounts}){
  const [form,setForm]=useState(null);
  const assets=accounts.filter(a=>!atypeById(a.accountType)?.isDebt).reduce((s,a)=>s+(+a.balance||0),0);
  const liab=accounts.filter(a=>atypeById(a.accountType)?.isDebt).reduce((s,a)=>s+(+a.balance||0),0);
  const vnp=assets-liab;
  function openAdd(){setForm({id:null,name:"",accountType:"cheque",bank:"other",balance:"",target:""});}
  function openEdit(a){setForm({...a,balance:String(a.balance||0),target:String(a.target||"")});}
  function save(){
    if(!form.name.trim())return;
    const a={id:form.id||uid(),name:form.name.trim(),accountType:form.accountType,bank:form.bank,balance:parseFloat(form.balance)||0,target:parseFloat(form.target)||0};
    if(form.id)setAccounts(p=>p.map(x=>x.id===form.id?a:x));else setAccounts(p=>[...p,a]);setForm(null);
  }
  function del(id){setAccounts(p=>p.filter(a=>a.id!==id));setForm(null);}

  if(form)return(
    <div className="scroll">
      <div style={{background:C.surf,padding:"14px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
        <div className="tap" onClick={()=>setForm(null)} style={{width:34,height:34,borderRadius:11,background:C.card,display:"flex",alignItems:"center",justifyContent:"center",color:C.sec,fontSize:18}}>‹</div>
        <p style={{fontSize:17,fontWeight:700,color:C.text,margin:0}}>{form.id?"Modifier":"Ajouter"} un compte</p>
      </div>
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
        {/* Bank selector */}

  const debtL=accounts.filter(a=>atypeById(a.accountType)?.isDebt);

              <Card>
                {list.map((a,i)=>{const at=atypeById(a.accountType);const pct=a.target>0?Math.min((a.balance/a.target)*100,100):0;const b=bankById(a.bank);return(
                  <div key={a.id} className="tap" onClick={()=>openEdit(a)} style={{padding:"12px 16px",borderBottom:i<list.length-1?`1px solid ${C.border}`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:a.target>0?8:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <BankLogo bankId={a.bank} name={a.name} size={40}/>
                        <div><p style={{fontSize:14,fontWeight:500,margin:0,color:C.text}}>{a.name}</p><p style={{fontSize:11,margin:0,color:C.muted}}>{b.label} · {at.label}</p></div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <p style={{fontSize:14,fontWeight:700,margin:0,color:at.isDebt?C.red:C.text}}>{at.isDebt?"-":""}{fmt(a.balance)}</p>
                        {a.target>0&&<p style={{fontSize:10,margin:"1px 0 0",color:C.muted}}>/ {fmt(a.target)}</p>}
                      </div>
                    </div>
                    {a.target>0&&<><div style={{height:4,background:C.border2,borderRadius:2}}><div style={{width:`${pct}%`,height:"100%",background:b.col,borderRadius:2}}/></div><p style={{fontSize:10,color:C.muted,margin:"3px 0 0"}}>{Math.round(pct)}% de l'objectif</p></>}
                  </div>
                );})}
              </Card>
            </div>
          )
        ))}
        {accounts.length===0&&<Card style={{padding:"32px",textAlign:"center"}}><p style={{fontSize:14,color:C.muted,margin:"0 0 4px",fontWeight:500}}>Aucun compte</p><p style={{fontSize:12,color:C.muted,margin:0}}>Ajoute tes comptes pour voir ta valeur nette</p></Card>}
        <div className="tap" onClick={openAdd} style={{background:C.accentL,color:C.accent,textAlign:"center",padding:"14px",borderRadius:16,fontSize:15,fontWeight:700,border:`1px solid ${C.accent}44`}}>+ Ajouter un compte</div>
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

// ── SCAN ────────────────────────────────────────────────────────────
function ScanView({addMany,accounts,cats}){
  const [stage,setStage]=useState("upload");const [preview,setPreview]=useState(null);const [parsed,setParsed]=useState([]);const [err,setErr]=useState("");
  const fileRef=useRef();
  async function handleFile(e){
    const file=e.target.files[0];if(!file)return;setStage("loading");setErr("");setPreview(URL.createObjectURL(file));
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
    try{
      const catIds=cats.map(c=>c.id).join(", ");
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},
          {type:"text",text:`Analyse ce document financier. Réponds UNIQUEMENT avec un tableau JSON valide. Aucun texte avant ou après, aucune balise markdown.
Format: [{"date":"YYYY-MM-DD","description":"Marchand","amount":12.34,"type":"expense","category":"alim"}]
type: expense=sortie, income=dépôt/salaire, epargne=transfert épargne. amount: positif. date: ${todayStr()} si invisible.
Catégories disponibles: ${catIds}
Règles: alim=épicerie/restaurant, habitation=loyer/hydro/assurance, transport=essence/auto/taxi/parking, sante=pharmacie/médecin/dentiste, telecom=cellulaire/internet, loisirs=sorties/streaming/voyage/bar, financiers=remboursement carte/frais/intérêts, salaire=salaire emploi permanent, livraison=revenu livraison, revenus=autres revenus, formation=école/livres, enfants, animaux, epargne=transfert épargne, retraite=REER/CELI.
Inclure TOUTES les transactions visibles. Si une catégorie ne correspond pas exactement, choisis la plus proche dans la liste.`}
        ]}]})});
      const data=await resp.json();const text=data.content?.find(b=>b.type==="text")?.text||"";
      const clean=text.replace(/```json?/g,"").replace(/```/g,"").trim();
      setParsed(JSON.parse(clean).map((t,i)=>({...t,id:`s-${Date.now()}-${i}`,amount:Math.abs(parseFloat(t.amount)||0),selected:true,accountId:accounts[0]?.id||null})));
      setStage("review");
    }catch(e){setErr("Impossible d'analyser. Essaie une image plus nette.");setStage("upload");}
  }
  const toggle=id=>setParsed(p=>p.map(t=>t.id===id?{...t,selected:!t.selected}:t));
  const updateCat=(id,c)=>setParsed(p=>p.map(t=>t.id===id?{...t,category:c}:t));
  const sel=parsed.filter(t=>t.selected);
  return(
    <div className="scroll">
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:11}}>
        {stage==="upload"&&<>
          <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
          <div className="tap" onClick={()=>fileRef.current.click()} style={{background:C.card,border:`2px dashed ${C.accent}44`,borderRadius:20,padding:"3rem 1.5rem",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
            <div style={{width:64,height:64,borderRadius:18,background:C.accentL,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="3" y="6" width="22" height="16" rx="2.5" stroke={C.accent} strokeWidth="1.8"/><circle cx="10" cy="12" r="2.5" fill={C.accent} fillOpacity=".4"/><path d="M3 19l6-5 5 4 4-3 7 6" stroke={C.accent} strokeWidth="1.5" strokeOpacity=".6" strokeLinejoin="round"/></svg>
            </div>
            <div><p style={{fontSize:16,fontWeight:700,margin:"0 0 5px",color:C.text}}>Choisir une image</p><p style={{fontSize:13,color:C.muted,margin:0}}>Reçu ou capture d'écran de ta banque</p></div>
          </div>
          {err&&<p style={{fontSize:13,color:C.red,textAlign:"center"}}>{err}</p>}
          <Card style={{padding:"14px 16px",background:C.accentL,border:`1px solid ${C.accent}30`}}>
            <p style={{fontSize:12,fontWeight:700,color:C.accent,margin:"0 0 4px"}}>Comment ça marche</p>
            <p style={{fontSize:12,color:C.sec,margin:0,lineHeight:1.7}}>L'IA lit ton image, identifie chaque transaction et l'assigne à une catégorie automatiquement selon TES catégories personnalisées. Tu révises avant d'enregistrer.</p>
          </Card>
        </>}
        {stage==="loading"&&<Card style={{padding:"3rem",textAlign:"center"}}>
          {preview&&<img src={preview} alt="" style={{width:"100%",maxHeight:140,objectFit:"contain",borderRadius:12,marginBottom:16,opacity:.4}}/>}
          <p style={{fontSize:16,fontWeight:700,color:C.text,margin:"0 0 6px"}}>Analyse en cours...</p>
          <p style={{fontSize:13,color:C.muted}}>L'IA catégorise tes transactions</p>
        </Card>}
        {stage==="review"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <p style={{fontSize:13,color:C.muted,margin:0}}>{parsed.length} détectée(s) · {sel.length} sélectionnée(s)</p>
            <span className="tap" onClick={()=>{setStage("upload");setPreview(null);}} style={{fontSize:12,color:C.accent}}>Recommencer</span>
          </div>
          {parsed.map(t=>{const cat=cats.find(c=>c.id===t.category)||cats[3];return(
            <Card key={t.id} style={{padding:"13px 16px",opacity:t.selected?1:.4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
                  <div className="tap" onClick={()=>toggle(t.id)} style={{width:24,height:24,borderRadius:7,flexShrink:0,background:t.selected?C.accent:"transparent",border:`2px solid ${t.selected?C.accent:C.border2}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {t.selected&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>}
                  </div>
                  <div style={{minWidth:0}}><p style={{fontSize:14,fontWeight:600,margin:0,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.description}</p><p style={{fontSize:11,margin:"2px 0 0",color:C.muted}}>{t.date}</p></div>
                </div>
                <p style={{fontSize:14,fontWeight:700,margin:0,flexShrink:0,paddingLeft:8,color:t.type==="income"?C.green:C.text}}>{t.type==="income"?"+":"-"}{fmt(t.amount)}</p>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {cats.filter(c=>!c.forTypes||c.forTypes.includes(t.type)).map(c=>(
                  <div key={c.id} className="chip tap" onClick={()=>updateCat(t.id,c.id)}
                    style={{background:t.category===c.id?c.color+"28":"rgba(255,255,255,.05)",color:t.category===c.id?c.color:C.muted,borderColor:t.category===c.id?c.color:C.border,fontWeight:t.category===c.id?700:400,fontSize:11}}>
                    {c.icon} {c.label}
                  </div>
                ))}
              </div>
            </Card>
          );})}
          <div className="tap" onClick={()=>{addMany(sel);setStage("upload");}} style={{background:C.accent,color:"#fff",textAlign:"center",padding:"15px",borderRadius:16,fontSize:16,fontWeight:700,opacity:sel.length===0?.4:1}}>
            Enregistrer {sel.length} transaction{sel.length>1?"s":""}
          </div>
        </>}
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

  return(
    <div style={{background:C.surf,borderTop:`1px solid ${C.border2}`,display:"flex",alignItems:"center",padding:"8px 4px 14px",flexShrink:0}}>
      {left.map(t=>(
        <div key={t.id} className="tap" onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"4px 0"}}>
          <NavIco n={t.n} active={tab===t.id}/>
          <span style={{fontSize:9,color:tab===t.id?C.accent:C.muted,fontWeight:tab===t.id?700:400}}>{t.l}</span>
        </div>
      ))}
      <div style={{width:70,display:"flex",justifyContent:"center"}}>
        <div className="tap" onClick={()=>setTab("add")} style={{width:52,height:52,borderRadius:17,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 6px 24px ${C.accent}60`,marginBottom:4}}>
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="10.1" y="5" width="1.8" height="12" rx=".9" fill="white"/><rect x="5" y="10.1" width="12" height="1.8" rx=".9" fill="white"/></svg>
        </div>
      </div>
      {right.map(t=>(
        <div key={t.id} className="tap" onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"4px 0"}}>
          <NavIco n={t.n} active={tab===t.id}/>
          <span style={{fontSize:9,color:tab===t.id?C.accent:C.muted,fontWeight:tab===t.id?700:400}}>{t.l}</span>
        </div>
      ))}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("home");
  const [txns,setTxns]=useState([]);
  const [accounts,setAccounts]=useState([]);
  const [cats,setCats]=useState(DEFAULT_CATS);
  const [budgets,setBudgets]=useState({});
  const [vnpHistory,setVnpHistory]=useState([]);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const[t,a,ca,b,v]=await Promise.allSettled([
          STORE.get("fin:t7"),STORE.get("fin:a7"),STORE.get("fin:c7"),STORE.get("fin:b7"),STORE.get("fin:v7")
        ]);
        if(t.status==="fulfilled"&&t.value)setTxns(JSON.parse(t.value));
        if(a.status==="fulfilled"&&a.value)setAccounts(JSON.parse(a.value));
        if(ca.status==="fulfilled"&&ca.value)setCats(JSON.parse(ca.value));
        if(b.status==="fulfilled"&&b.value)setBudgets(JSON.parse(b.value));
        if(v.status==="fulfilled"&&v.value)setVnpHistory(JSON.parse(v.value));
      }catch(e){}
      setReady(true);
    })();
  },[]);

  useEffect(()=>{if(ready)STORE.set("fin:t7",JSON.stringify(txns));}, [txns,ready]);
  useEffect(()=>{if(ready)STORE.set("fin:c7",JSON.stringify(cats));}, [cats,ready]);
  useEffect(()=>{if(ready)STORE.set("fin:b7",JSON.stringify(budgets));}, [budgets,ready]);

  useEffect(()=>{
    if(!ready)return;
    STORE.set("fin:a7",JSON.stringify(accounts));
    if(accounts.length===0)return;
    const assets=accounts.filter(a=>!atypeById(a.accountType)?.isDebt).reduce((s,a)=>s+(+a.balance||0),0);
    const liab=accounts.filter(a=>atypeById(a.accountType)?.isDebt).reduce((s,a)=>s+(+a.balance||0),0);
    const vnp=assets-liab;const mk=monthKey();
    setVnpHistory(prev=>{
      const existing=prev.find(h=>h.month===mk);
      if(existing&&existing.vnp===vnp)return prev;
      const next=[...prev.filter(h=>h.month!==mk),{month:mk,vnp}].sort((a,b)=>a.month.localeCompare(b.month));
      STORE.set("fin:v7",JSON.stringify(next));return next;
    });
  },[accounts,ready]);

  // addMany: add transactions AND update account balances
  const addMany=useCallback(newTxns=>{
    setAccounts(prev=>{
      let updated=[...prev];
      newTxns.forEach(t=>{
        if(t.type==="expense"&&t.accountId){updated=updated.map(a=>a.id===t.accountId?{...a,balance:Math.max(0,(+a.balance||0)-t.amount)}:a);}
        else if(t.type==="income"&&t.accountId){updated=updated.map(a=>a.id===t.accountId?{...a,balance:(+a.balance||0)+t.amount}:a);}
        else if(t.type==="epargne"){
          if(t.accountId)updated=updated.map(a=>a.id===t.accountId?{...a,balance:Math.max(0,(+a.balance||0)-t.amount)}:a);
          if(t.accountToId)updated=updated.map(a=>a.id===t.accountToId?{...a,balance:(+a.balance||0)+t.amount}:a);
        }
      });
      return updated;
    });
    setTxns(p=>[...newTxns,...p]);
  },[]);

  // deleteTxn: remove AND reverse account balance
  const deleteTxn=useCallback(id=>{
    const txn=txns.find(t=>t.id===id);
    if(!txn){setTxns(p=>p.filter(t=>t.id!==id));return;}
    setAccounts(prev=>{
      let updated=[...prev];
      if(txn.type==="expense"&&txn.accountId){updated=updated.map(a=>a.id===txn.accountId?{...a,balance:(+a.balance||0)+txn.amount}:a);}
      else if(txn.type==="income"&&txn.accountId){updated=updated.map(a=>a.id===txn.accountId?{...a,balance:Math.max(0,(+a.balance||0)-txn.amount)}:a);}
      else if(txn.type==="epargne"){
        if(txn.accountId)updated=updated.map(a=>a.id===txn.accountId?{...a,balance:(+a.balance||0)+txn.amount}:a);
        if(txn.accountToId)updated=updated.map(a=>a.id===txn.accountToId?{...a,balance:Math.max(0,(+a.balance||0)-txn.amount)}:a);
      }
      return updated;
    });
    setTxns(p=>p.filter(t=>t.id!==id));
  },[txns]);

  if(!ready)return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:14,background:C.bg}}>Chargement...</div>;

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
      {tab==="home"     &&<Home txns={txns} cats={cats} accounts={accounts} budgets={budgets} vnpHistory={vnpHistory} setTab={setTab}/>}
      {tab==="activity" &&<Activity txns={txns} cats={cats} accounts={accounts} deleteTxn={deleteTxn}/>}
      {tab==="add"      &&<AddTxn addMany={addMany} accounts={accounts} cats={cats} onDone={()=>setTab("home")}/>}
      {tab==="budget"   &&<BudgetView txns={txns} cats={cats} budgets={budgets} setBudgets={setBudgets}/>}
      {tab==="stats"    &&<StatsView txns={txns} cats={cats} setCats={setCats} accounts={accounts} setAccounts={setAccounts} addMany={addMany} vnpHistory={vnpHistory}/>}
      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
