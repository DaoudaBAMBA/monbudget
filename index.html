// ── CATS VIEW ──────────────────────────────────────────────────────
function CatsView({cats,setCats}){
  const [mode,setMode]=useState("list"); // list | add | edit
  const [editId,setEditId]=useState(null);
  const BLANK={label:"",icon:"dollar",color:COLORS[0],forTypes:["expense"],parentId:""};
  const [form,setForm]=useState(BLANK);
  const [catExpanded,setCatExpanded]=useState({});
  function toggleCat(id){setCatExpanded(p=>({...p,[id]:!p[id]}));}
  const TYPE_OPTS=[{id:"expense",l:"Dépense"},{id:"income",l:"Revenu"},{id:"epargne",l:"Épargne"}];
  const ICO_KEYS=Object.keys(ILIB);

  function resetForm(){setForm(BLANK);}
  function startAdd(){resetForm();setMode("add");}
  function startEdit(cat){
    setEditId(cat.id);
    setForm({label:cat.label,icon:cat.icon||"dollar",color:cat.color,forTypes:cat.forTypes||["expense"],parentId:cat.parentId||""});
    setMode("edit");
  }
  function cancel(){setMode("list");resetForm();setEditId(null);}

  function addCat(){
    if(!form.label.trim())return;
    const c={id:"c-"+uid(),label:form.label.trim(),icon:form.icon,color:form.color,forTypes:form.forTypes,isDefault:false};
    if(form.parentId)c.parentId=form.parentId;
    setCats(p=>[...p,c]);cancel();
  }
  function saveEdit(){
    if(!form.label.trim())return;
    setCats(p=>p.map(c=>c.id===editId?{...c,label:form.label.trim(),icon:form.icon,color:form.color}:c));
    cancel();
  }
  function delCat(id){
    setCats(p=>p.filter(c=>c.id!==id&&c.parentId!==id));
    cancel();
  }

  function CatForm({isEdit}){
    const parentOpts=cats.filter(c=>!c.parentId&&c.forTypes?.some(t=>form.forTypes.includes(t))&&(!isEdit||c.id!==editId));
    return(
      <Card style={{padding:"14px 16px"}}>
        <p style={{fontSize:13,fontWeight:700,color:C.text,margin:"0 0 14px"}}>{isEdit?"Modifier catégorie":"Nouvelle catégorie"}</p>
        <div style={{marginBottom:10}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Nom</p>
          <input value={form.label} onChange={e=>setForm(p=>({...p,label:e.target.value}))} placeholder="Ex: Épicerie spéciale..."
            style={{width:"100%",fontSize:15,border:"none",background:C.card2,borderRadius:10,padding:"9px 12px",color:C.text}}/>
        </div>
        {!isEdit&&(
          <div style={{marginBottom:10}}>
            <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Type</p>
            <div style={{display:"flex",gap:7}}>
              {TYPE_OPTS.map(t=>(
                <div key={t.id} className="chip tap" onClick={()=>setForm(p=>({...p,forTypes:[t.id],parentId:""}))}
                  style={{background:form.forTypes.includes(t.id)?C.accentL:C.card2,color:form.forTypes.includes(t.id)?C.accent:C.muted,borderColor:form.forTypes.includes(t.id)?C.accent:"transparent"}}>
                  {t.l}
                </div>
              ))}
            </div>
          </div>
        )}
        {!isEdit&&parentOpts.length>0&&(
          <div style={{marginBottom:10}}>
            <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Rattacher à (sous-catégorie de)</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              <div className="chip tap" onClick={()=>setForm(p=>({...p,parentId:""}))}
                style={{background:!form.parentId?C.accentL:C.card2,color:!form.parentId?C.accent:C.muted,borderColor:!form.parentId?C.accent:"transparent"}}>
                Principale
              </div>
              {parentOpts.map(po=>(
                <div key={po.id} className="chip tap" onClick={()=>setForm(p=>({...p,parentId:po.id}))}
                  style={{background:form.parentId===po.id?po.color+"30":C.card2,color:form.parentId===po.id?po.color:C.muted,borderColor:form.parentId===po.id?po.color:"transparent"}}>
                  {po.label}
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{marginBottom:10}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Icône</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {ICO_KEYS.map(ik=>(
              <div key={ik} className="tap" onClick={()=>setForm(p=>({...p,icon:ik}))}
                style={{width:36,height:36,borderRadius:10,background:form.icon===ik?form.color+"30":C.card2,border:`1.5px solid ${form.icon===ik?form.color:"transparent"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <IcoSVG name={ik} size={17} color={form.icon===ik?form.color:"rgba(255,255,255,.38)"}/>
              </div>
            ))}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <p style={{fontSize:10,color:C.muted,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".07em"}}>Couleur</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {COLORS.map(col=>(
              <div key={col} className="tap" onClick={()=>setForm(p=>({...p,color:col}))}
                style={{width:28,height:28,borderRadius:8,background:col,border:`2.5px solid ${form.color===col?"white":"transparent"}`,flexShrink:0}}/>
            ))}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:isEdit?"1fr 1fr 1fr":"1fr 1fr",gap:8}}>
          <div className="tap" onClick={cancel} style={{textAlign:"center",padding:"12px",borderRadius:14,background:C.card2,fontSize:14,fontWeight:600,color:C.sec}}>Annuler</div>
          {isEdit&&<div className="tap" onClick={()=>delCat(editId)} style={{textAlign:"center",padding:"12px",borderRadius:14,background:C.redL,fontSize:14,fontWeight:600,color:C.red}}>Supprimer</div>}
          <div className="tap" onClick={isEdit?saveEdit:addCat} style={{textAlign:"center",padding:"12px",borderRadius:14,background:C.accent,fontSize:14,fontWeight:700,color:"#fff"}}>{isEdit?"Sauvegarder":"Créer"}</div>
        </div>
      </Card>
    );
  }

  function renderGroup(typeId,typeLabel){
    const typeCats=cats.filter(c=>c.forTypes?.includes(typeId));
    if(typeCats.length===0)return null;
    const parents=typeCats.filter(c=>!c.parentId);
    const orphans=typeCats.filter(c=>c.parentId&&!cats.find(p=>p.id===c.parentId));
    return(
      <div key={typeId}>
        <p style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8,paddingLeft:4}}>{typeLabel}</p>
        <Card>
          {[...parents,...orphans].map((par,pi,arr)=>{
            const subs=typeCats.filter(c=>c.parentId===par.id);
            const isLast=pi===arr.length-1;
            const hasSubs=subs.length>0;
            const open=!!catExpanded[par.id];
            return(
              <React.Fragment key={par.id}>
                <div style={{display:"flex",alignItems:"center",gap:9,padding:"11px 14px",borderBottom:(!isLast||hasSubs&&open)?`1px solid ${C.border}`:"none"}}>
                  <div className="tap" onClick={()=>hasSubs&&toggleCat(par.id)}
                    style={{width:22,height:22,borderRadius:6,background:hasSubs?C.card2:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:hasSubs?"pointer":"default"}}>
                    {hasSubs&&<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d={open?"M2 4l4 4 4-4":"M4 2l4 4-4 4"} stroke={C.muted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                  <CatIconBadge cat={par} size={34}/>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:14,margin:0,color:C.text,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{par.label}</p>
                    {hasSubs&&<p style={{fontSize:9,color:C.muted,margin:"2px 0 0"}}>{subs.length} sous-cat. · {open?"réduire":"développer"}</p>}
                  </div>
                  <div className="tap" onClick={()=>startEdit(par)} style={{padding:"5px 10px",borderRadius:8,background:C.accentL,color:C.accent,fontSize:11,fontWeight:600,marginRight:4,flexShrink:0}}>Modifier</div>
                  {!par.isDefault&&<div className="tap" onClick={()=>delCat(par.id)} style={{padding:"5px 8px",borderRadius:8,background:C.redL,color:C.red,fontSize:12,fontWeight:700,flexShrink:0}}>✕</div>}
                </div>
                {open&&hasSubs&&subs.map((sub,si)=>(
                  <div key={sub.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px 9px 36px",borderBottom:(si<subs.length-1||!isLast)?`1px solid ${C.border}`:"none",background:"rgba(255,255,255,.02)"}}>
                    <div style={{width:12,height:12,borderLeft:`2px solid ${C.border2}`,borderBottom:`2px solid ${C.border2}`,borderRadius:"0 0 0 4px",flexShrink:0,marginRight:2}}/>
                    <CatIconBadge cat={sub} size={26}/>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:13,margin:0,color:C.sec,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub.label}</p>
                    </div>
                    <div className="tap" onClick={()=>startEdit(sub)} style={{padding:"4px 9px",borderRadius:8,background:C.accentL,color:C.accent,fontSize:11,fontWeight:600,marginRight:4,flexShrink:0}}>Modifier</div>
                    {!sub.isDefault&&<div className="tap" onClick={()=>delCat(sub.id)} style={{padding:"4px 7px",borderRadius:8,background:C.redL,color:C.red,fontSize:12,fontWeight:700,flexShrink:0}}>✕</div>}
                  </div>
                ))}
              </React.Fragment>
            );
          })}
        </Card>
      </div>
    );
  }

  return(
    <div className="scroll">
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
        {mode==="add"&&<CatForm isEdit={false}/>}
        {mode==="edit"&&<CatForm isEdit={true}/>}
        {mode==="list"&&<div className="tap" onClick={startAdd} style={{background:C.accentL,color:C.accent,textAlign:"center",padding:"13px",borderRadius:16,fontSize:15,fontWeight:700,border:`1px solid ${C.accent}44`}}>+ Ajouter une catégorie</div>}
        {renderGroup("expense","Dépenses")}
        {renderGroup("income","Revenus")}
        {renderGroup("epargne","Épargne")}
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

// ── SCAN ────────────────────────────────────────────────────────────
function ScanView({addMany,accounts,cats,txns=[]}){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("fin:apikey")||"");
  const [showKeyInput,setShowKeyInput]=useState(!localStorage.getItem("fin:apikey"));
  const [stage,setStage]=useState("upload");const [preview,setPreview]=useState(null);const [parsed,setParsed]=useState([]);const [err,setErr]=useState("");
  const fileRef=useRef();
  function saveKey(){if(!apiKey.trim())return;localStorage.setItem("fin:apikey",apiKey.trim());setShowKeyInput(false);}
  async function handleFile(e){
    const file=e.target.files[0];if(!file)return;
    const key=localStorage.getItem("fin:apikey");if(!key){setShowKeyInput(true);return;}
    setStage("loading");setErr("");setPreview(URL.createObjectURL(file));
    const isPDF=file.type==="application/pdf";
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
    const catIds=cats.map(c=>c.id).join(", ");
    const contentBlock=isPDF?{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}:{type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}};
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4000,messages:[{role:"user",content:[contentBlock,{type:"text",text:`Analyse ce document financier (${isPDF?"PDF":"image"}). Réponds UNIQUEMENT avec un tableau JSON valide. Aucun texte avant ou après, aucune balise markdown.
Format: [{"date":"YYYY-MM-DD","description":"Marchand","amount":12.34,"type":"expense","category":"alim"}]
type: expense=sortie/débit, income=dépôt/salaire, epargne=transfert. amount: positif toujours. date: ${todayStr()} si invisible.
Catégories: ${catIds}
Règles: alim=épicerie/resto/café, habitation=loyer/hydro/assurance/condo, transport=essence/taxi/STM/parking/Uber, sante=pharmacie/médecin/dentiste, telecom=cellulaire/internet, loisirs=sorties/streaming/voyage/bar, financiers=frais/intérêts, salaire=salaire permanent, livraison=DoorDash/Uber, revenus=autres, formation=école/livres, enfants=garderie/jouets, animaux=vétérinaire, epargne=transfert/invest, retraite=REER/CELI.
Inclure TOUTES les transactions.`}]}]})});
      if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||"HTTP "+resp.status);}
      const data=await resp.json();const text=data.content?.find(b=>b.type==="text")?.text||"";
      const clean=text.replace(/```json?/g,"").replace(/```/g,"").trim();
      const rawTxns=JSON.parse(clean);
      const withFlags=rawTxns.map((t,i)=>{
        const amt=Math.abs(parseFloat(t.amount)||0);
        const isDup=txns.some(ex=>ex.date===t.date&&Math.abs((+ex.amount||0)-amt)<0.02&&ex.type===t.type);
        return{...t,id:`s-${Date.now()}-${i}`,amount:amt,selected:!isDup,accountId:accounts[0]?.id||null,isDuplicate:isDup};
      });
      setParsed(withFlags);setStage("review");
    }catch(e){console.error(e);setErr("Erreur: "+(e.message||"Vérifie ta clé API"));setStage("upload");}
  }
  const toggle=id=>setParsed(p=>p.map(t=>t.id===id?{...t,selected:!t.selected}:t));
  const updateCat=(id,c)=>setParsed(p=>p.map(t=>t.id===id?{...t,category:c}:t));
  const updateDesc=(id,v)=>setParsed(p=>p.map(t=>t.id===id?{...t,description:v}:t));
  const updateAmount=(id,v)=>setParsed(p=>p.map(t=>t.id===id?{...t,amount:Math.abs(parseFloat(v)||0)}:t));
  const sel=parsed.filter(t=>t.selected);
  if(showKeyInput)return(
    <div className="scroll" style={{padding:"14px"}}>
      <Card style={{padding:"20px"}}>
        <p style={{fontSize:15,fontWeight:700,color:C.text,margin:"0 0 12px"}}>Clé API Anthropic requise</p>
        <p style={{fontSize:13,color:C.sec,margin:"0 0 14px",lineHeight:1.6}}>Obtiens une clé gratuite sur <span style={{color:C.accent,fontWeight:600}}>console.anthropic.com</span>. Elle sera stockée localement sur ton appareil.</p>
        <input value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",fontSize:14,border:`1px solid ${C.border2}`,background:C.card2,borderRadius:10,padding:"10px 12px",color:C.text,marginBottom:12}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div className="tap" onClick={()=>{setShowKeyInput(false);setApiKey("");}} style={{textAlign:"center",padding:"11px",borderRadius:12,background:C.card2,fontSize:13,fontWeight:600,color:C.sec}}>Ignorer</div>
          <div className="tap" onClick={saveKey} style={{textAlign:"center",padding:"11px",borderRadius:12,background:C.accent,fontSize:13,fontWeight:700,color:"#fff"}}>Enregistrer</div>
        </div>
      </Card>
    </div>
  );
  return(
    <div className="scroll">
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:11}}>
        {stage==="upload"&&<>
          <input ref={fileRef} type="file" accept="image/*,.pdf,application/pdf" onChange={handleFile} style={{display:"none"}}/>
          <div className="tap" onClick={()=>fileRef.current.click()} style={{background:C.card,border:`2px dashed ${C.accent}44`,borderRadius:20,padding:"3rem 1.5rem",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
            <div style={{width:64,height:64,borderRadius:18,background:C.accentL,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="3" y="6" width="22" height="16" rx="2.5" stroke={C.accent} strokeWidth="1.8"/><circle cx="10" cy="12" r="2.5" fill={C.accent} fillOpacity=".4"/><path d="M3 19l6-5 5 4 4-3 7 6" stroke={C.accent} strokeWidth="1.5" strokeOpacity=".6" strokeLinejoin="round"/></svg>
            </div>
            <div><p style={{fontSize:16,fontWeight:700,margin:"0 0 5px",color:C.text}}>Choisir un fichier</p><p style={{fontSize:13,color:C.muted,margin:0}}>Image, PDF, reçu ou relève bancaire</p></div>
          </div>
          {err&&<p style={{fontSize:13,color:C.red,textAlign:"center"}}>{err}</p>}
          <Card style={{padding:"14px 16px",background:C.accentL,border:`1px solid ${C.accent}30`}}>
            <p style={{fontSize:12,fontWeight:700,color:C.accent,margin:"0 0 6px"}}>📄 Supporte</p>
            <p style={{fontSize:12,color:C.sec,margin:0,lineHeight:1.6}}>Images (JPG, PNG) • PDF (relevés bancaires) • Reçus • Captures d'écran</p>
          </Card>
        </>}
        {stage==="loading"&&<Card style={{padding:"3rem",textAlign:"center"}}>
          {preview&&<img src={preview} alt="" style={{width:"100%",maxHeight:140,objectFit:"contain",borderRadius:12,marginBottom:16,opacity:.4}}/>}
          <p style={{fontSize:16,fontWeight:700,color:C.text,margin:"0 0 6px"}}>Analyse en cours...</p>
          <p style={{fontSize:13,color:C.muted}}>L'IA catégorise tes transactions</p>
        </Card>}
        {stage==="review"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <p style={{fontSize:13,color:C.muted,margin:0}}>{parsed.length} détectée(s) · {sel.length} sélectionnée(s)</p>
            <span className="tap" onClick={()=>{setStage("upload");setPreview(null);}} style={{fontSize:12,color:C.accent}}>Recommencer</span>
          </div>
          {parsed.map(t=>{const cat=cats.find(c=>c.id===t.category)||cats[3];return(
            <Card key={t.id} style={{padding:"13px 16px",opacity:t.selected?1:.5,border:t.isDuplicate?`1px solid ${C.orange}44`:`1px solid ${C.border}`}}>

                <input type="number" value={t.amount} onChange={e=>updateAmount(t.id,e.target.value)}

          <div className="tap" onClick={()=>{addMany(sel);setStage("upload");}} style={{background:C.accent,color:"#fff",textAlign:"center",padding:"15px",borderRadius:16,fontSize:16,fontWeight:700,opacity:sel.length===0?.4:1}}>
            Enregistrer {sel.length} transaction{sel.length>1?"s":""}

// ── ABONNEMENTS ───────────────────────────────────────────────────────
function SubsView({subs,setSubs,addMany}){
  const today=todayStr();
  const [showForm,setShowForm]=useState(false);
  const [editSub,setEditSub]=useState(null);
  const [rowExpanded,setRowExpanded]=useState({});
  const BLANK={id:"",name:"",amount:"",frequency:"monthly",nextDate:today,color:COLORS[0],icon:"repeat"};
  const [form,setForm]=useState(BLANK);
  const active=[...subs].filter(s=>s.active!==false).sort((a,b)=>a.nextDate.localeCompare(b.nextDate));
  const monthlyTotal=active.reduce((s,sub)=>s+toMonthly(+sub.amount,sub.frequency),0);
  const upcoming=active.filter(s=>daysUntil(s.nextDate)<=30);
  const later=active.filter(s=>daysUntil(s.nextDate)>30);
  function markPaid(sub){
    addMany([{id:uid(),type:"expense",amount:+sub.amount,description:sub.name,date:today,category:sub.category||null,accountId:null}]);
    setSubs(p=>p.map(s=>s.id===sub.id?{...s,nextDate:advanceDate(s.nextDate,s.frequency)}:s));
    setRowExpanded({});
  }
  function saveSub(){
    const amt=parseFloat(String(form.amount).replace(",","."));
    if(!form.name||isNaN(amt)||amt<=0)return;
    const sub={...form,id:form.id||uid(),amount:amt};
    setSubs(p=>editSub?p.map(s=>s.id===editSub.id?sub:s):[sub,...p]);
    setShowForm(false);setEditSub(null);setForm(BLANK);
  }
  function openAdd(){setForm({...BLANK,nextDate:today});setEditSub(null);setShowForm(true);}
  function openEdit(sub){setForm({...sub,amount:String(sub.amount)});setEditSub(sub);setShowForm(true);}
  function deleteSub(id){setSubs(p=>p.filter(s=>s.id!==id));setRowExpanded({});}
  function SubRow({sub}){
    const days=daysUntil(sub.nextDate);
    const freq=FREQS.find(f=>f.id===sub.frequency)||FREQS[2];
    const isOpen=!!rowExpanded[sub.id];
    const urgCol=days<0?C.red:days<=3?C.orange:days<=7?C.accent:C.sec;
    const dayLbl=days<0?`${Math.abs(days)}j en retard`:days===0?"Aujourd'hui":days===1?"Demain":`Dans ${days}j`;
    return(
      <React.Fragment key={sub.id}>
        <div className="tap" onClick={()=>setRowExpanded(p=>({...p,[sub.id]:!p[sub.id]}))}
          style={{padding:"12px 14px",display:"flex",gap:10,alignItems:"center",borderBottom:isOpen?"none":`1px solid ${C.border}`}}>
          <CatIconBadge cat={{icon:sub.icon,color:sub.color}} size={40}/>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:13,fontWeight:700,margin:0,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub.name}</p>
            <p style={{fontSize:10,margin:"2px 0 0",color:C.muted}}>{freq.label} · {fmt(toMonthly(+sub.amount,sub.frequency))}/mois</p>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <p style={{fontSize:14,fontWeight:800,margin:0,color:C.text}}>{fmt(sub.amount)}</p>
            <p style={{fontSize:10,margin:"2px 0 0",color:urgCol,fontWeight:500}}>{dayLbl}</p>
          </div>
        </div>
        {isOpen&&<div style={{padding:"8px 14px 12px",background:"rgba(255,255,255,.025)",borderBottom:`1px solid ${C.border}`,display:"flex",gap:8,flexWrap:"wrap"}}>
          {days<=7&&<div className="tap" onClick={()=>markPaid(sub)}
            style={{display:"flex",alignItems:"center",gap:6,background:C.greenL,border:`1px solid ${C.green}50`,borderRadius:10,padding:"7px 13px"}}>
            <IcoSVG name="check" size={13} color={C.green}/>
            <span style={{fontSize:12,fontWeight:700,color:C.green}}>Marquer payé</span>
          </div>}
          <div className="tap" onClick={()=>openEdit(sub)}
            style={{display:"flex",alignItems:"center",gap:6,background:C.card2,borderRadius:10,padding:"7px 13px"}}>
            <IcoSVG name="pencil" size={13} color={C.sec}/>
            <span style={{fontSize:12,color:C.sec}}>Modifier</span>
          </div>
          <div className="tap" onClick={()=>deleteSub(sub.id)}
            style={{display:"flex",alignItems:"center",gap:6,background:C.redL,border:`1px solid ${C.red}30`,borderRadius:10,padding:"7px 13px"}}>
            <IcoSVG name="trash" size={13} color={C.red}/>
            <span style={{fontSize:12,color:C.red}}>Supprimer</span>
          </div>
        </div>}
      </React.Fragment>
    );
  }
  return(
    <div className="scroll">
      <div style={{background:C.accentB,padding:"18px 20px 22px",borderBottomLeftRadius:28,borderBottomRightRadius:28}}>
        <p style={{fontSize:11,color:"rgba(255,255,255,.5)",margin:"0 0 2px",textTransform:"uppercase",letterSpacing:".07em"}}>Abonnements actifs</p>
        <p style={{fontSize:30,fontWeight:800,margin:"0 0 3px",letterSpacing:"-1px"}}>{fmt(monthlyTotal)}<span style={{fontSize:13,fontWeight:500,opacity:.55}}> / mois</span></p>
        <p style={{fontSize:12,color:"rgba(255,255,255,.55)",margin:"0 0 12px"}}>{active.length} abonnement{active.length!==1?"s":""} · {fmt(monthlyTotal*12)} / an</p>
        <div className="tap" onClick={openAdd}
          style={{display:"inline-flex",alignItems:"center",gap:7,background:"rgba(255,255,255,.15)",borderRadius:12,padding:"9px 16px",border:"1px solid rgba(255,255,255,.2)"}}>
          <IcoSVG name="plus" size={14} color="white"/>
          <span style={{fontSize:13,fontWeight:600,color:"white"}}>Ajouter un abonnement</span>
        </div>
      </div>
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:12}}>
        {active.length===0&&<Card><div style={{padding:"32px 16px",textAlign:"center"}}>
          <IcoSVG name="repeat" size={32} color={C.muted}/>
          <p style={{fontSize:14,color:C.muted,margin:"10px 0 4px"}}>Aucun abonnement</p>
          <p style={{fontSize:12,color:C.muted}}>Netflix, Spotify, Hydro-Québec…</p>
        </div></Card>}
        {upcoming.length>0&&<div>
          <p style={{fontSize:11,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:".07em",margin:"0 0 6px",paddingLeft:2}}>À venir — 30 jours</p>
          <Card>{upcoming.map(s=><SubRow key={s.id} sub={s}/>)}</Card>
        </div>}
        {later.length>0&&<div>
          <p style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".07em",margin:"0 0 6px",paddingLeft:2}}>Plus tard</p>
          <Card>{later.map(s=><SubRow key={s.id} sub={s}/>)}</Card>
        </div>}
        <div style={{height:8}}/>
      </div>
      {showForm&&<div className="overlay" onClick={()=>{setShowForm(false);setEditSub(null);setForm(BLANK);}}
        style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:900,display:"flex",alignItems:"flex-end"}}>
        <div className="sheet" onClick={e=>e.stopPropagation()}
          style={{width:"100%",background:C.surf,borderTopLeftRadius:28,borderTopRightRadius:28,padding:"20px 20px 36px",maxHeight:"88vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <p style={{fontSize:17,fontWeight:800,color:C.text,margin:0}}>{editSub?"Modifier l'abonnement":"Nouvel abonnement"}</p>
            <div className="tap" onClick={()=>{setShowForm(false);setEditSub(null);setForm(BLANK);}}><IcoSVG name="x" size={20} color={C.muted}/></div>
          </div>
          <div style={{marginBottom:12}}>
            <p style={{fontSize:11,color:C.muted,marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:".04em"}}>Nom</p>
            <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Netflix, Hydro-Québec…"
              style={{width:"100%",background:C.card,border:`1px solid ${C.border2}`,borderRadius:12,padding:"11px 14px",fontSize:15,color:C.text}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <p style={{fontSize:11,color:C.muted,marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:".04em"}}>Montant ($)</p>
              <input type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} placeholder="0.00" min="0" step="0.01"
                style={{width:"100%",background:C.card,border:`1px solid ${C.border2}`,borderRadius:12,padding:"11px 14px",fontSize:15,color:C.text}}/>
            </div>
            <div>
              <p style={{fontSize:11,color:C.muted,marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:".04em"}}>Fréquence</p>
              <select value={form.frequency} onChange={e=>setForm(p=>({...p,frequency:e.target.value}))}
                style={{width:"100%",background:C.card,border:`1px solid ${C.border2}`,borderRadius:12,padding:"11px 12px",fontSize:13,color:C.text,appearance:"none"}}>
                {FREQS.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
              </select>
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <p style={{fontSize:11,color:C.muted,marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:".04em"}}>Prochain paiement</p>
            <input type="date" value={form.nextDate} onChange={e=>setForm(p=>({...p,nextDate:e.target.value}))}
              style={{width:"100%",background:C.card,border:`1px solid ${C.border2}`,borderRadius:12,padding:"11px 14px",fontSize:15,color:C.text}}/>
          </div>
          <div style={{marginBottom:12}}>
            <p style={{fontSize:11,color:C.muted,marginBottom:7,fontWeight:600,textTransform:"uppercase",letterSpacing:".04em"}}>Couleur</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {COLORS.map(col=><div key={col} className="tap" onClick={()=>setForm(p=>({...p,color:col}))}
                style={{width:28,height:28,borderRadius:9,background:col,border:form.color===col?"3px solid white":"2px solid transparent"}}/>)}
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <p style={{fontSize:11,color:C.muted,marginBottom:7,fontWeight:600,textTransform:"uppercase",letterSpacing:".04em"}}>Icône</p>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Object.keys(ILIB).filter(k=>!["pencil","trash","check","plus","x"].includes(k)).map(k=>(
                <div key={k} className="tap" onClick={()=>setForm(p=>({...p,icon:k}))}
                  style={{width:36,height:36,borderRadius:10,background:form.icon===k?form.color:C.card2,display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${form.icon===k?form.color:"transparent"}`}}>
                  <IcoSVG name={k} size={16} color={form.icon===k?"white":C.muted}/>
                </div>
              ))}
            </div>
          </div>
          <div className="tap" onClick={saveSub}
            style={{background:C.accent,color:"white",textAlign:"center",padding:"15px",borderRadius:16,fontSize:16,fontWeight:700}}>
            {editSub?"Enregistrer":"Ajouter"}
          </div>
        </div>
      </div>}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("home");
  const [txns,setTxns]=useState([]);
  const [accounts,setAccounts]=useState([]);
  const [cats,setCats]=useState(DEFAULT_CATS);
  const [budgets,setBudgets]=useState({});
  const [subs,setSubs]=useState([]);
  const [vnpHistory,setVnpHistory]=useState([]);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const[t,a,ca,b,v,s]=await Promise.allSettled([
          STORE.get("fin:t7"),STORE.get("fin:a7"),STORE.get("fin:c7"),STORE.get("fin:b7"),STORE.get("fin:v7"),STORE.get("fin:s7")
        ]);
        if(t.status==="fulfilled"&&t.value)setTxns(JSON.parse(t.value));
        if(a.status==="fulfilled"&&a.value)setAccounts(JSON.parse(a.value));
        if(ca.status==="fulfilled"&&ca.value)setCats(JSON.parse(ca.value));
        if(b.status==="fulfilled"&&b.value)setBudgets(JSON.parse(b.value));
        if(v.status==="fulfilled"&&v.value)setVnpHistory(JSON.parse(v.value));
        if(s.status==="fulfilled"&&s.value)setSubs(JSON.parse(s.value));
      }catch(e){}
      setReady(true);
    })();
  },[]);

  // Sync auto quand la fenêtre redevient visible (favori mobile / onglet)
  useEffect(()=>{
    const handleVisibility=()=>{
      if(document.hidden)return;
      setTimeout(async()=>{
        try{
          const[t,a,ca,b,v,s]=await Promise.allSettled([
            STORE.get("fin:t7"),STORE.get("fin:a7"),STORE.get("fin:c7"),STORE.get("fin:b7"),STORE.get("fin:v7"),STORE.get("fin:s7")
          ]);
          if(t.status==="fulfilled"&&t.value)setTxns(JSON.parse(t.value));
          if(a.status==="fulfilled"&&a.value)setAccounts(JSON.parse(a.value));
          if(ca.status==="fulfilled"&&ca.value)setCats(JSON.parse(ca.value));
          if(b.status==="fulfilled"&&b.value)setBudgets(JSON.parse(b.value));
          if(v.status==="fulfilled"&&v.value)setVnpHistory(JSON.parse(v.value));
          if(s.status==="fulfilled"&&s.value)setSubs(JSON.parse(s.value));
        }catch(e){}
      },150);
    };
    document.addEventListener("visibilitychange",handleVisibility);
    return()=>document.removeEventListener("visibilitychange",handleVisibility);
  },[]);

  useEffect(()=>{if(ready)STORE.set("fin:t7",JSON.stringify(txns));}, [txns,ready]);
  useEffect(()=>{if(ready)STORE.set("fin:c7",JSON.stringify(cats));}, [cats,ready]);
  useEffect(()=>{if(ready)STORE.set("fin:b7",JSON.stringify(budgets));}, [budgets,ready]);
  useEffect(()=>{if(ready)STORE.set("fin:s7",JSON.stringify(subs));}, [subs,ready]);

  useEffect(()=>{
    if(!ready)return;
    STORE.set("fin:a7",JSON.stringify(accounts));
    if(accounts.length===0)return;
    const assets=accounts.filter(a=>!atypeById(a.accountType)?.isDebt).reduce((s,a)=>s+(+a.balance||0),0);
    const liab=accounts.filter(a=>atypeById(a.accountType)?.isDebt).reduce((s,a)=>s+(+a.balance||0),0);
    const vnp=assets-liab;const mk=monthKey();
    setVnpHistory(prev=>{
      const existing=prev.find(h=>h.month===mk);
      if(existing&&existing.vnp===vnp)return prev;
      const next=[...prev.filter(h=>h.month!==mk),{month:mk,vnp}].sort((a,b)=>a.month.localeCompare(b.month));
      STORE.set("fin:v7",JSON.stringify(next));return next;
    });
  },[accounts,ready]);

  // addMany: add transactions AND update account balances
  const addMany=useCallback(newTxns=>{
    setAccounts(prev=>{
      let updated=[...prev];
      newTxns.forEach(t=>{
        if(t.type==="expense"&&t.accountId){updated=updated.map(a=>a.id===t.accountId?{...a,balance:Math.max(0,(+a.balance||0)-t.amount)}:a);}
        else if(t.type==="income"&&t.accountId){updated=updated.map(a=>a.id===t.accountId?{...a,balance:(+a.balance||0)+t.amount}:a);}
        else if(t.type==="epargne"){
          if(t.accountId)updated=updated.map(a=>a.id===t.accountId?{...a,balance:Math.max(0,(+a.balance||0)-t.amount)}:a);
          if(t.accountToId)updated=updated.map(a=>a.id===t.accountToId?{...a,balance:(+a.balance||0)+t.amount}:a);
        }
      });
      return updated;
    });
    setTxns(p=>[...newTxns,...p]);
  },[]);

  // deleteTxn: remove AND reverse account balance
  const deleteTxn=useCallback(id=>{
    const txn=txns.find(t=>t.id===id);
    if(!txn){setTxns(p=>p.filter(t=>t.id!==id));return;}
    setAccounts(prev=>{
      let updated=[...prev];
      if(txn.type==="expense"&&txn.accountId){updated=updated.map(a=>a.id===txn.accountId?{...a,balance:(+a.balance||0)+txn.amount}:a);}
      else if(txn.type==="income"&&txn.accountId){updated=updated.map(a=>a.id===txn.accountId?{...a,balance:Math.max(0,(+a.balance||0)-txn.amount)}:a);}
      else if(txn.type==="epargne"){
        if(txn.accountId)updated=updated.map(a=>a.id===txn.accountId?{...a,balance:(+a.balance||0)+txn.amount}:a);
        if(txn.accountToId)updated=updated.map(a=>a.id===txn.accountToId?{...a,balance:Math.max(0,(+a.balance||0)-txn.amount)}:a);
      }
      return updated;
    });
    setTxns(p=>p.filter(t=>t.id!==id));
  },[txns]);

  // editTxn: update description/amount/category/date, adjust balances for amount change
  const editTxn=useCallback(updated=>{
    const old=txns.find(t=>t.id===updated.id);if(!old)return;
    setAccounts(prev=>{
      let u=[...prev];
      const diff=updated.amount-old.amount;
      if(diff!==0){
        if(old.type==="expense"&&old.accountId)u=u.map(a=>a.id===old.accountId?{...a,balance:Math.max(0,(+a.balance||0)-diff)}:a);
        else if(old.type==="income"&&old.accountId)u=u.map(a=>a.id===old.accountId?{...a,balance:(+a.balance||0)+diff}:a);
        else if(old.type==="epargne"){
          if(old.accountId)u=u.map(a=>a.id===old.accountId?{...a,balance:Math.max(0,(+a.balance||0)-diff)}:a);
          if(old.accountToId)u=u.map(a=>a.id===old.accountToId?{...a,balance:(+a.balance||0)+diff}:a);
        }
      }
      return u;
    });
    setTxns(p=>p.map(t=>t.id===updated.id?updated:t));
  },[txns]);

  if(!ready)return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:14,background:C.bg}}>Chargement...</div>;

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"row",background:C.bg}}>
      <SideNav tab={tab} setTab={setTab}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        {tab==="home"     &&<Home txns={txns} cats={cats} accounts={accounts} setAccounts={setAccounts} budgets={budgets} subs={subs} setSubs={setSubs} addMany={addMany} vnpHistory={vnpHistory} setTab={setTab}/>}
        {tab==="activity" &&<Activity txns={txns} cats={cats} accounts={accounts} deleteTxn={deleteTxn} editTxn={editTxn}/>}
        {tab==="add"      &&<AddTxn addMany={addMany} accounts={accounts} cats={cats} onDone={()=>setTab("home")}/>}
        {tab==="budget"   &&<BudgetView txns={txns} cats={cats} budgets={budgets} setBudgets={setBudgets}/>}
        {tab==="stats"    &&<StatsView txns={txns} cats={cats} setCats={setCats} accounts={accounts} setAccounts={setAccounts} addMany={addMany} vnpHistory={vnpHistory} budgets={budgets} subs={subs} setSubs={setSubs}/>}
        <BottomNav tab={tab} setTab={setTab}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// Enregistrer le Service Worker pour PWA
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW registration failed:',e));
  });
}
</script>
</body>
</html>
